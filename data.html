<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Data Explorer</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
/* ── Tabs ──────────────────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 2px; margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 16px; cursor: pointer; white-space: nowrap;
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: var(--dim); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--white); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab .cnt {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 3px;
  color: var(--dim);
}
.tab.active .cnt { background: rgba(240,180,41,.12); color: var(--gold); }

/* ── Toolbar ───────────────────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  margin-bottom: 12px;
}
.toolbar .inp { flex: 1; min-width: 160px; font-size: 12px; padding: 7px 10px; }
.toolbar select.inp { flex: 0 0 auto; min-width: 130px; }

/* ── Stats bar ─────────────────────────────────────────────────────────── */
.stats-bar {
  display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px;
  font-size: 11px; color: var(--dim);
}
.stats-bar .stat-val {
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  color: var(--white); margin-right: 3px;
}
.stats-bar .stat-warn {
  color: var(--gold); font-weight: 600;
}
.stats-bar .stat-err {
  color: #e07070; font-weight: 600;
}

/* ── Data grid ─────────────────────────────────────────────────────────── */
.grid-wrap { overflow-x: auto; margin-bottom: 16px; }

.dgrid {
  width: 100%; border-collapse: collapse;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
}
.dgrid th {
  background: #071810; color: var(--dim);
  font-weight: 600; font-size: 10px; letter-spacing: .06em;
  text-transform: uppercase; padding: 8px 10px; text-align: left;
  white-space: nowrap; cursor: pointer; user-select: none;
  border-bottom: 1px solid rgba(240,180,41,.2);
  position: sticky; top: 0; z-index: 2;
}
.dgrid th:hover { color: var(--gold); }
.dgrid th.s { color: var(--gold); }
.dgrid th.s::after { content: ' \25BC'; font-size: 8px; }
.dgrid th.s.asc::after { content: ' \25B2'; }
.dgrid td {
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap; vertical-align: middle;
  max-width: 220px; overflow: hidden; text-overflow: ellipsis;
}
.dgrid tr:hover td { background: rgba(255,255,255,.025); }
.dgrid .mono { font-family: 'JetBrains Mono', monospace; }
.dgrid .dim { color: var(--dim); }
.dgrid .null { color: rgba(255,255,255,.15); font-style: italic; }
.dgrid .warn-cell { color: var(--gold); }
.dgrid .err-cell { color: #e07070; }
.dgrid .ok-cell { color: var(--green); }
.dgrid .id-cell { color: var(--dim); font-size: 10px; }
.dgrid .name-cell { font-family: 'Inter', sans-serif; font-weight: 600; color: var(--white); }
.dgrid .flag-cell { font-family: 'Inter', sans-serif; }
.dgrid .fee-cell { color: var(--gold); }
.dgrid .type-loan { color: #7ab4f0; }
.dgrid .type-free { color: var(--green); }
.dgrid .type-transfer { color: var(--gold); }

/* ── Pagination ────────────────────────────────────────────────────────── */
.pager {
  display: flex; gap: 4px; align-items: center; justify-content: center;
  font-size: 12px; color: var(--dim);
}
.pager button {
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  color: var(--dim); border-radius: 5px; padding: 5px 10px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  cursor: pointer; transition: all .15s;
}
.pager button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
.pager button:disabled { opacity: .3; cursor: not-allowed; }
.pager button.pg-active { background: rgba(240,180,41,.15); color: var(--gold); border-color: rgba(240,180,41,.3); }
.pager .pg-info { font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0 8px; }

/* ── Loading ───────────────────────────────────────────────────────────── */
.loading {
  text-align: center; padding: 40px; color: var(--dim); font-size: 13px;
}
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.loading-dot { animation: pulse 1.2s infinite; }

/* ── Quality alerts ────────────────────────────────────────────────────── */
.quality-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
}
.q-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600; padding: 4px 8px;
  border-radius: 4px; cursor: pointer; transition: all .15s;
}
.q-badge:hover { filter: brightness(1.3); }
.q-ok { background: rgba(96,185,122,.1); color: var(--green); }
.q-warn { background: rgba(240,180,41,.1); color: var(--gold); }
.q-err { background: rgba(224,52,52,.1); color: #e07070; }

/* ── Breadcrumb ───────────────────────────────────────────────────────── */
.breadcrumb {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px; font-size: 11px; min-height: 0;
}
.breadcrumb:empty { display: none; }
.bc-item {
  color: var(--dim); cursor: pointer; transition: color .15s;
  font-weight: 600;
}
.bc-item:hover { color: var(--gold); }
.bc-sep { color: rgba(255,255,255,.15); }
.bc-current { color: var(--white); cursor: default; }
.bc-clear {
  margin-left: 8px; font-size: 10px; color: var(--dim);
  cursor: pointer; padding: 2px 8px; border: 1px solid var(--border);
  border-radius: 3px; transition: all .15s;
}
.bc-clear:hover { border-color: var(--gold); color: var(--gold); }

/* ── Clickable rows ───────────────────────────────────────────────────── */
.dgrid tr.clickable { cursor: pointer; }
.dgrid tr.clickable:hover td { background: rgba(240,180,41,.04); }
.dgrid tr.clickable td:first-child { position: relative; }
.dgrid tr.clickable td:first-child::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--gold); opacity: 0; transition: opacity .15s;
}
.dgrid tr.clickable:hover td:first-child::before { opacity: 1; }

@media (max-width: 680px) {
  .tab { padding: 8px 10px; font-size: 10px; }
  .tab .cnt { display: none; }
}
</style>
</head>
<body>
<div class="page" style="max-width:1200px">
  <div class="page-header">
    <div class="tourn-label">Backend</div>
    <h1>Data <span>Explorer</span></h1>
    <div class="subtitle" id="subtitle">Loading tables...</div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="quality-bar" id="quality"></div>
  <div class="toolbar" id="toolbar"></div>
  <div class="stats-bar" id="stats"></div>
  <div class="grid-wrap"><table class="dgrid" id="dgrid"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  <div class="pager" id="pager"></div>
  <div class="loading" id="loader">Loading<span class="loading-dot">...</span></div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('data');

const PER_PAGE = 100;
let activeTab = 'leagues';
let cache = {};
let lookups = {};
let sortCol = null, sortAsc = true;
let page = 0;
let searchVal = '';
let filterVal = '';

// Drill-down state
let drill = { league: null, club: null }; // { league: {code,name}, club: {id,name} }

// ── Table definitions ───────────────────────────────────────────────────

const TABLES = {
  leagues: {
    query: 'leagues?select=*&order=category,name',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'espn_code', label:'ESPN Code' },
      { key:'name', label:'Name', cls:'name-cell', wide:true },
      { key:'category', label:'Category' },
      { key:'confederation', label:'Conf' },
      { key:'country_code', label:'CC' },
      { key:'level', label:'Lvl' },
      { key:'season_start_month', label:'Season Mo' },
      { key:'season_span_months', label:'Span' },
    ],
    searchKeys: ['name','espn_code','category'],
    rowClick: r => drillToLeague(r.espn_code, r.name),
  },
  seasons: {
    query: 'seasons?select=*,leagues(name,espn_code)&order=league_id,start_date',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'_league', label:'League', cls:'name-cell', wide:true, get: r => r.leagues?.name || '' },
      { key:'_code', label:'Code', get: r => r.leagues?.espn_code || '' },
      { key:'label', label:'Label' },
      { key:'start_date', label:'Start' },
      { key:'end_date', label:'End' },
      { key:'is_current', label:'Current', fmt: v => v ? 'YES' : '', cls: v => v ? 'ok-cell' : 'dim' },
    ],
    searchKeys: ['label'],
    searchFn: (r,q) => (r.leagues?.name||'').toLowerCase().includes(q) || (r.label||'').toLowerCase().includes(q),
  },
  clubs: {
    query: 'club_teams?select=*&order=league_espn_code,name',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'name', label:'Name', cls:'name-cell', wide:true },
      { key:'short_name', label:'Short' },
      { key:'league_espn_code', label:'League' },
      { key:'espn_team_id', label:'ESPN ID' },
      { key:'country_code', label:'CC' },
      { key:'roster_updated_at', label:'Roster Updated', fmt: v => v ? v.slice(0,10) : '', cls: v => v ? 'dim' : 'warn-cell' },
    ],
    searchKeys: ['name','short_name','league_espn_code'],
    rowClick: r => drillToClub(r.id, r.name, r.league_espn_code),
    quality: data => {
      const noRoster = data.filter(r => !r.roster_updated_at).length;
      return noRoster ? [{ label:`${noRoster} never fetched`, cls:'q-warn', filter: r => !r.roster_updated_at }] : [];
    },
  },
  national_teams: {
    query: 'national_teams?select=*&order=name',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'flag_emoji', label:'', cls:'flag-cell' },
      { key:'name', label:'Name', cls:'name-cell', wide:true },
      { key:'short_name', label:'Short' },
      { key:'confederation', label:'Conf' },
      { key:'espn_team_id', label:'ESPN ID', cls: v => v ? '' : 'warn-cell', fmt: v => v || 'missing' },
    ],
    searchKeys: ['name','short_name','confederation'],
    quality: data => {
      const noEspn = data.filter(r => !r.espn_team_id).length;
      return noEspn ? [{ label:`${noEspn} no ESPN ID`, cls:'q-warn', filter: r => !r.espn_team_id }] : [];
    },
  },
  players: {
    query: 'players?select=*,national_teams:nationality_id(name,flag_emoji),club_teams:current_club_id(name)&order=name',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'name', label:'Name', cls:'name-cell', wide:true },
      { key:'primary_position', label:'Pos', fmt: v => v || '' },
      { key:'_nationality', label:'Nationality', cls:'flag-cell', get: r => (r.national_teams?.flag_emoji||'') + ' ' + (r.national_teams?.name||''), warn: r => !r.nationality_id },
      { key:'_club', label:'Club', get: r => r.club_teams?.name || '', cls:'dim', warn: r => !r.current_club_id },
      { key:'date_of_birth', label:'DOB', fmt: v => v || '', cls: v => v ? 'dim' : 'null' },
      { key:'height_cm', label:'cm', cls:'dim' },
      { key:'espn_id', label:'ESPN', cls:'id-cell' },
    ],
    searchKeys: ['name'],
    searchFn: (r,q) => (r.name||'').toLowerCase().includes(q) || (r.national_teams?.name||'').toLowerCase().includes(q) || (r.club_teams?.name||'').toLowerCase().includes(q),
    paginate: true,
    quality: data => {
      const noClub = data.filter(r => !r.current_club_id).length;
      const noNat = data.filter(r => !r.nationality_id).length;
      const noDob = data.filter(r => !r.date_of_birth).length;
      const noEspn = data.filter(r => !r.espn_id).length;
      const alerts = [];
      if (noClub) alerts.push({ label:`${noClub} no club`, cls:'q-warn', filter: r => !r.current_club_id });
      if (noNat) alerts.push({ label:`${noNat} no nationality`, cls:'q-err', filter: r => !r.nationality_id });
      if (noDob) alerts.push({ label:`${noDob} no DOB`, cls:'q-warn', filter: r => !r.date_of_birth });
      if (noEspn) alerts.push({ label:`${noEspn} no ESPN ID`, cls:'q-err', filter: r => !r.espn_id });
      return alerts;
    },
  },
  transfers: {
    query: 'transfers?select=*,players!transfers_player_id_fkey(name,espn_id),from:club_teams!transfers_from_club_id_fkey(name),to:club_teams!transfers_to_club_id_fkey(name),seasons(label)&order=transfer_date.desc.nullslast',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'transfer_date', label:'Date' },
      { key:'_player', label:'Player', cls:'name-cell', wide:true, get: r => r.players?.name || '???' },
      { key:'_from', label:'From', get: r => r.from?.name || '', cls: r => r.from_club_id ? 'dim' : 'null', warn: r => !r.from_club_id && r.type !== 'free' },
      { key:'_to', label:'To', get: r => r.to?.name || '', cls: r => r.to_club_id ? 'dim' : 'null', warn: r => !r.to_club_id },
      { key:'type', label:'Type', cls: v => 'type-'+v },
      { key:'fee_eur', label:'Fee', fmt: v => v ? (v >= 1e6 ? `\u20AC${(v/1e6).toFixed(1)}M` : `\u20AC${(v/1e3).toFixed(0)}K`) : '', cls:'fee-cell' },
      { key:'_season', label:'Season', get: r => r.seasons?.label || '', cls:'dim' },
    ],
    searchFn: (r,q) => (r.players?.name||'').toLowerCase().includes(q) || (r.from?.name||'').toLowerCase().includes(q) || (r.to?.name||'').toLowerCase().includes(q),
    paginate: true,
    quality: data => {
      const noFrom = data.filter(r => !r.from_club_id && r.type !== 'free' && r.type !== 'new').length;
      const noTo = data.filter(r => !r.to_club_id && r.type !== 'unknown').length;
      const noDate = data.filter(r => !r.transfer_date).length;
      const alerts = [];
      if (noFrom) alerts.push({ label:`${noFrom} no from-club`, cls:'q-warn', filter: r => !r.from_club_id && r.type !== 'free' && r.type !== 'new' });
      if (noTo) alerts.push({ label:`${noTo} no to-club`, cls:'q-warn', filter: r => !r.to_club_id && r.type !== 'unknown' });
      if (noDate) alerts.push({ label:`${noDate} no date`, cls:'q-warn', filter: r => !r.transfer_date });
      return alerts;
    },
  },
  squads: {
    query: 'national_squads?select=*,players!inner(name,espn_id),national_teams:national_team_id(name,flag_emoji),seasons(label)&order=national_team_id,players(name)',
    cols: [
      { key:'id', label:'ID', cls:'id-cell' },
      { key:'_team', label:'Team', cls:'flag-cell', get: r => (r.national_teams?.flag_emoji||'') + ' ' + (r.national_teams?.name||'') },
      { key:'_player', label:'Player', cls:'name-cell', wide:true, get: r => r.players?.name || '' },
      { key:'position', label:'Pos' },
      { key:'status', label:'Status', cls:'dim' },
      { key:'league_code', label:'League' },
      { key:'_season', label:'Season', get: r => r.seasons?.label || '', cls:'dim' },
    ],
    searchFn: (r,q) => (r.players?.name||'').toLowerCase().includes(q) || (r.national_teams?.name||'').toLowerCase().includes(q),
  },
};

// ── Data loading ────────────────────────────────────────────────────────

async function loadTable(name) {
  if (cache[name]) return cache[name];
  const def = TABLES[name];
  const loader = document.getElementById('loader');
  loader.style.display = 'block';

  try {
    if (def.paginate) {
      let all = [], offset = 0;
      while (true) {
        const batch = await sb(`${def.query}&offset=${offset}&limit=1000`);
        all = all.concat(batch);
        if (batch.length < 1000) break;
        offset += 1000;
      }
      cache[name] = all;
    } else {
      cache[name] = await sb(def.query);
    }
  } catch(e) {
    console.error(e);
    cache[name] = [];
  }

  loader.style.display = 'none';
  return cache[name];
}

// ── Rendering ───────────────────────────────────────────────────────────

let activeQualityFilter = null;

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = Object.entries(TABLES).map(([key, def]) => {
    const cnt = cache[key] ? cache[key].length : '';
    const active = key === activeTab ? 'active' : '';
    return `<div class="tab ${active}" onclick="switchTab('${key}')">${key.replace('_',' ')}<span class="cnt">${cnt}</span></div>`;
  }).join('');
}

function renderQuality(data) {
  const def = TABLES[activeTab];
  const el = document.getElementById('quality');
  if (!def.quality) { el.innerHTML = ''; return; }
  const alerts = def.quality(data);
  if (!alerts.length) {
    el.innerHTML = '<span class="q-badge q-ok">All clean</span>';
    return;
  }
  el.innerHTML = alerts.map((a, i) =>
    `<span class="q-badge ${a.cls}" onclick="toggleQualityFilter(${i})" data-qi="${i}">${a.label}</span>`
  ).join('');
  // Store filters for click handler
  el._alerts = alerts;
}

function toggleQualityFilter(idx) {
  const el = document.getElementById('quality');
  const alerts = el._alerts;
  if (!alerts || !alerts[idx]) return;

  if (activeQualityFilter === idx) {
    activeQualityFilter = null;
    el.querySelectorAll('.q-badge').forEach(b => b.style.outline = '');
  } else {
    activeQualityFilter = idx;
    el.querySelectorAll('.q-badge').forEach((b, i) => {
      b.style.outline = i === idx ? '2px solid currentColor' : '';
    });
  }
  page = 0;
  render();
}

function renderToolbar() {
  const def = TABLES[activeTab];
  document.getElementById('toolbar').innerHTML =
    `<input type="text" class="inp" placeholder="Search ${activeTab}..." value="${searchVal}" oninput="searchVal=this.value.toLowerCase();page=0;render()">`;
}

function getFiltered(data) {
  const def = TABLES[activeTab];
  let filtered = data;

  // Drill-down filters
  if (drill.league) {
    if (activeTab === 'clubs') {
      filtered = filtered.filter(r => r.league_espn_code === drill.league.code);
    }
  }
  if (drill.club) {
    if (activeTab === 'players') {
      filtered = filtered.filter(r => r.current_club_id === drill.club.id);
    }
  }

  // Quality filter
  const qEl = document.getElementById('quality');
  if (activeQualityFilter !== null && qEl._alerts && qEl._alerts[activeQualityFilter]) {
    filtered = filtered.filter(qEl._alerts[activeQualityFilter].filter);
  }

  // Text search
  if (searchVal) {
    const q = searchVal;
    if (def.searchFn) {
      filtered = filtered.filter(r => def.searchFn(r, q));
    } else if (def.searchKeys) {
      filtered = filtered.filter(r => def.searchKeys.some(k => (r[k]||'').toString().toLowerCase().includes(q)));
    }
  }

  return filtered;
}

function sortData(data) {
  if (!sortCol) return data;
  const def = TABLES[activeTab];
  const col = def.cols.find(c => (c.key) === sortCol);
  const sorted = [...data];
  sorted.sort((a, b) => {
    let av = col.get ? col.get(a) : a[sortCol];
    let bv = col.get ? col.get(b) : b[sortCol];
    if (av == null) av = '';
    if (bv == null) bv = '';
    if (typeof av === 'number' && typeof bv === 'number') return sortAsc ? av - bv : bv - av;
    av = String(av).toLowerCase();
    bv = String(bv).toLowerCase();
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  return sorted;
}

function render() {
  const def = TABLES[activeTab];
  const data = cache[activeTab] || [];
  const filtered = getFiltered(data);
  const sorted = sortData(filtered);

  // Stats
  const statsEl = document.getElementById('stats');
  const total = data.length;
  const shown = filtered.length;
  statsEl.innerHTML = total === shown
    ? `<span><span class="stat-val">${total}</span> rows</span>`
    : `<span><span class="stat-val">${shown}</span> of <span class="stat-val">${total}</span> rows</span>`;

  // Thead
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr>' + def.cols.map(c => {
    const sorted = sortCol === c.key;
    const cls = sorted ? (sortAsc ? 's asc' : 's') : '';
    return `<th class="${cls}" onclick="doSort('${c.key}')"${c.wide ? ' style="min-width:180px"' : ''}>${c.label}</th>`;
  }).join('') + '</tr>';

  // Paginate
  const start = def.paginate ? page * PER_PAGE : 0;
  const end = def.paginate ? start + PER_PAGE : sorted.length;
  const pageData = sorted.slice(start, end);

  // Tbody
  const tbody = document.getElementById('tbody');
  if (!pageData.length) {
    tbody.innerHTML = `<tr><td colspan="${def.cols.length}" style="text-align:center;color:var(--dim);padding:24px">No data</td></tr>`;
  } else {
    // Store for click handlers
    tbody._pageData = pageData;
    tbody.innerHTML = pageData.map((row, ri) => {
      const clickAttr = def.rowClick ? ` class="clickable" onclick="handleRowClick(${ri})"` : '';
      return `<tr${clickAttr}>` + def.cols.map(c => {
        const raw = c.get ? c.get(row) : row[c.key];
        const display = c.fmt ? c.fmt(raw) : (raw === null || raw === undefined ? '' : raw);
        const isWarn = c.warn && c.warn(row);
        let cls = '';
        if (typeof c.cls === 'function') cls = c.cls(raw);
        else if (c.cls) cls = c.cls;
        if (isWarn) cls += ' warn-cell';
        if (display === '' && !c.get) cls += ' null';
        return `<td class="${cls}">${display === '' && !c.fmt ? '<span class="null">—</span>' : display}</td>`;
      }).join('') + '</tr>';
    }).join('');
  }

  // Pager
  const pager = document.getElementById('pager');
  if (def.paginate && sorted.length > PER_PAGE) {
    const totalPages = Math.ceil(sorted.length / PER_PAGE);
    let btns = '';
    btns += `<button ${page===0?'disabled':''} onclick="page=0;render()">&#171;</button>`;
    btns += `<button ${page===0?'disabled':''} onclick="page--;render()">&#8249;</button>`;

    const start = Math.max(0, page - 3);
    const end = Math.min(totalPages, start + 7);
    for (let i = start; i < end; i++) {
      btns += `<button class="${i===page?'pg-active':''}" onclick="page=${i};render()">${i+1}</button>`;
    }

    btns += `<button ${page>=totalPages-1?'disabled':''} onclick="page++;render()">&#8250;</button>`;
    btns += `<button ${page>=totalPages-1?'disabled':''} onclick="page=${totalPages-1};render()">&#187;</button>`;
    btns += `<span class="pg-info">${sorted.length} rows</span>`;
    pager.innerHTML = btns;
  } else {
    pager.innerHTML = '';
  }
}

// ── Drill-down ──────────────────────────────────────────────────────────

async function drillToLeague(code, name) {
  drill = { league: { code, name }, club: null };
  activeTab = 'clubs'; sortCol = null; sortAsc = true;
  page = 0; searchVal = ''; activeQualityFilter = null;
  renderTabs(); renderToolbar(); renderBreadcrumb();
  const data = await loadTable('clubs');
  renderQuality(data);
  render();
}

async function drillToClub(id, name, leagueCode) {
  if (!drill.league && leagueCode) {
    const leagueName = (cache.leagues || []).find(l => l.espn_code === leagueCode)?.name || leagueCode;
    drill.league = { code: leagueCode, name: leagueName };
  }
  drill.club = { id, name };
  activeTab = 'players'; sortCol = null; sortAsc = true;
  page = 0; searchVal = ''; activeQualityFilter = null;
  renderTabs(); renderToolbar(); renderBreadcrumb();
  const data = await loadTable('players');
  renderQuality(data);
  render();
}

function drillClear() {
  drill = { league: null, club: null };
  switchTab(activeTab);
}

function drillBackToLeagues() {
  drill = { league: null, club: null };
  switchTab('leagues');
}

function drillBackToClubs() {
  drill.club = null;
  activeTab = 'clubs'; sortCol = null; sortAsc = true;
  page = 0; searchVal = ''; activeQualityFilter = null;
  renderTabs(); renderToolbar(); renderBreadcrumb();
  const data = cache['clubs'] || [];
  renderQuality(data);
  render();
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (!drill.league && !drill.club) { el.innerHTML = ''; return; }
  let html = '';
  if (drill.league) {
    if (drill.club) {
      html += `<span class="bc-item" onclick="drillBackToLeagues()">Leagues</span>`;
      html += `<span class="bc-sep">›</span>`;
      html += `<span class="bc-item" onclick="drillBackToClubs()">${drill.league.name}</span>`;
      html += `<span class="bc-sep">›</span>`;
      html += `<span class="bc-current">${drill.club.name}</span>`;
    } else {
      html += `<span class="bc-item" onclick="drillBackToLeagues()">Leagues</span>`;
      html += `<span class="bc-sep">›</span>`;
      html += `<span class="bc-current">${drill.league.name}</span>`;
    }
  }
  html += `<span class="bc-clear" onclick="drillClear()">✕ Clear</span>`;
  el.innerHTML = html;
}

function handleRowClick(idx) {
  const tbody = document.getElementById('tbody');
  const row = tbody._pageData && tbody._pageData[idx];
  const def = TABLES[activeTab];
  if (row && def.rowClick) def.rowClick(row);
}

function doSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  render();
}

async function switchTab(name) {
  activeTab = name;
  sortCol = null; sortAsc = true;
  page = 0; searchVal = '';
  activeQualityFilter = null;
  // Clear drill-down when switching tabs manually
  if (name === 'leagues' || (name !== 'clubs' && name !== 'players')) {
    drill = { league: null, club: null };
  } else if (name === 'clubs') {
    drill.club = null;
  }
  renderTabs();
  renderToolbar();
  renderBreadcrumb();
  const data = await loadTable(name);
  renderQuality(data);
  render();
}

// ── Init ────────────────────────────────────────────────────────────────

async function init() {
  // Load all small tables in parallel, defer large ones
  const small = ['leagues','seasons','clubs','national_teams','squads'];
  await Promise.all(small.map(loadTable));
  renderTabs();
  document.getElementById('subtitle').textContent =
    Object.entries(cache).map(([k,v]) => `${v.length} ${k}`).join(' · ');
  await switchTab('leagues');
}

init();
</script>
