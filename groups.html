<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Group Stage</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 12px; }
.groups-meta { font-size: 11px; color: var(--dim); margin-bottom: 14px; }
.loading { color: var(--dim); font-size: 13px; text-align: center; padding: 40px; }
.best3-section { margin-top: 28px; }
.best3-title {
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.06em;
  color:var(--gold); margin-bottom:10px; display:flex; align-items:center; gap:10px;
}
.best3-title::after { content:''; flex:1; height:1px; background:var(--border); }
.best3-table { width:100%; border-collapse:collapse; font-size:12px; }
.best3-table th {
  background:#0d3320; color:var(--dim); font-weight:700; font-size:10px;
  letter-spacing:.08em; text-transform:uppercase; padding:8px 10px; text-align:left;
}
.best3-table td { padding:8px 10px; border-bottom:1px solid var(--border); }
.best3-table tr.qualify td { border-left:2px solid var(--green); }
.best3-table tr.eliminated td { opacity:.4; }
.best3-table .td-grp { font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:14px; }
.best3-table .td-stat { font-family:'JetBrains Mono',monospace; color:var(--dim); text-align:center; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="tourn-label">FIFA World Cup 2026</div>
    <h1>Group <span>Stage</span></h1>
    <div class="subtitle">12 groups · 48 teams · Top 2 + 8 best 3rd qualify</div>
  </div>

  <div class="groups-meta" id="groups-meta">Loading standings…</div>
  <div class="groups-grid" id="groups-grid"><div class="loading">Loading…</div></div>

  <div class="best3-section" id="best3-section" style="display:none">
    <div class="best3-title">8 Best Third-Place Teams</div>
    <div style="overflow-x:auto">
      <table class="best3-table">
        <thead><tr>
          <th>Grp</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th></th>
        </tr></thead>
        <tbody id="best3-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_standings.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('groups');

async function loadGroups() {
  const meta = document.getElementById('groups-meta');
  const grid = document.getElementById('groups-grid');

  try {
    const [teams, schedule] = await Promise.all([
      sb('teams?select=name,group_letter&order=group_letter,name'),
      sb('schedule?select=home_team,away_team,home_score,away_score,status,group_name&order=id')
    ]);

    const groups = computeStandings(teams, schedule);
    const qualGroups = qualifyingThirdGroups(groups);

    grid.innerHTML = '';
    const letters = Object.keys(groups).sort();
    letters.forEach(letter => {
      grid.appendChild(buildGroupCard(letter, groups[letter], qualGroups));
    });

    const ft = schedule.filter(m => m.status === 'FT' && m.group_name).length;
    meta.textContent = `${ft} of 72 matches played · Standings from Supabase · 🟢 qualifies · 🟡 possible best 3rd`;

    // Render best 3rd-place table
    renderBest3rd(groups, qualGroups);
  } catch(e) {
    grid.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function buildGroupCard(letter, teams, qualGroups) {
  const isNorwayGroup = teams.some(t => t.name.toLowerCase() === 'norway');
  const div = document.createElement('div');
  div.className = `group-card${isNorwayGroup ? ' norway' : ''}`;
  div.innerHTML = `
    <div class="group-hdr">Group ${letter}${isNorwayGroup ? ' 🇳🇴' : ''}</div>
    <div class="group-col-hdr">
      <span style="padding-left:10px">Team</span>
      <span>P</span><span>W</span><span>D</span><span>L</span><span>GF</span><span>GA</span><span>Pts</span>
    </div>
    ${teams.map((t, i) => {
      const isNor = t.name.toLowerCase() === 'norway';
      let cls = 'group-row', bar = '';
      if (i < 2 && t.pld > 0) { cls += ' qualify'; bar = '<span class="qbar qbar-g"></span>'; }
      else if (i === 2 && t.pld > 0) {
        if (qualGroups.has(letter)) { cls += ' maybe'; bar = '<span class="qbar qbar-y"></span>'; }
      }
      return `<div class="${cls}">${bar}
        <span style="padding-left:10px;font-weight:${isNor ? 700 : 400}">${FLAG_MAP[t.name] || ''} ${t.name}${isNor ? ' 🇳🇴' : ''}</span>
        <span style="color:var(--dim)">${t.pld}</span><span style="color:var(--dim)">${t.w}</span>
        <span style="color:var(--dim)">${t.d}</span><span style="color:var(--dim)">${t.l}</span>
        <span style="color:var(--dim)">${t.gf}</span><span style="color:var(--dim)">${t.ga}</span>
        <span class="gpts${t.pts === 0 ? ' zero' : ''}">${t.pts}</span>
      </div>`;
    }).join('')}`;
  return div;
}

function renderBest3rd(groups, qualGroups) {
  const thirds = bestThirdPlaces(groups);
  // Only show if at least one 3rd-place team has played
  if (!thirds.some(t => t.pld > 0)) return;

  document.getElementById('best3-section').style.display = '';
  document.getElementById('best3-tbody').innerHTML = thirds.map((t, i) => {
    const qual = i < 8;
    const gd = t.gf - t.ga;
    return `<tr class="${qual ? 'qualify' : 'eliminated'}">
      <td class="td-grp">${t.fromGroup}</td>
      <td style="font-weight:600">${FLAG_MAP[t.name] || ''} ${t.name}</td>
      <td class="td-stat">${t.pld}</td><td class="td-stat">${t.w}</td>
      <td class="td-stat">${t.d}</td><td class="td-stat">${t.l}</td>
      <td class="td-stat">${t.gf}</td><td class="td-stat">${t.ga}</td>
      <td class="td-stat" style="color:${gd > 0 ? 'var(--green)' : gd < 0 ? '#e07070' : 'var(--dim)'}">${gd > 0 ? '+' : ''}${gd}</td>
      <td class="td-stat" style="font-weight:700;color:var(--white)">${t.pts}</td>
      <td style="font-size:10px">${qual ? '✅ Qualifies' : ''}</td>
    </tr>`;
  }).join('');
}

loadGroups();
</script>
</body>
</html>
