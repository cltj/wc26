<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Schedule</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.date-nav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
.date-btn {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  color:var(--dim); font-size:11px; font-weight:600; padding:6px 10px;
  cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s;
  text-align:center; line-height:1.3;
}
.date-btn:hover { border-color:var(--gold); color:var(--white); }
.date-btn.active { background:rgba(240,180,41,.12); border-color:var(--gold); color:var(--gold); }
.date-btn .dow { display:block; font-size:9px; letter-spacing:.06em; text-transform:uppercase; opacity:.7; }
.date-btn .day { display:block; font-family:'Bebas Neue',sans-serif; font-size:18px; line-height:1; }

.day-section { margin-bottom:28px; }
.day-title {
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.06em;
  color:var(--gold); margin-bottom:10px; display:flex; align-items:center; gap:10px;
}
.day-title::after { content:''; flex:1; height:1px; background:var(--border); }

.match-list { display:flex; flex-direction:column; gap:8px; }
.match-card {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; transition:transform .15s;
}
.match-card:hover { transform:translateY(-1px); }
.match-card.norway { border-left:3px solid var(--norway); }
.match-card.live { border-color:rgba(96,185,122,.4); }

.match-row {
  display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
  gap:10px; padding:12px 16px;
}
.m-team { display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; }
.m-team.home { justify-content:flex-end; text-align:right; }
.m-team.away { justify-content:flex-start; }
.m-flag { font-size:20px; line-height:1; }
.m-score {
  font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700;
  min-width:60px; text-align:center; padding:4px 10px; border-radius:6px;
  background:rgba(255,255,255,.04);
}
.m-score.ft { background:rgba(240,180,41,.1); color:var(--gold); }
.m-score.live { background:rgba(96,185,122,.15); color:var(--green); animation:pulse 2s infinite; }
.m-score.sched { color:var(--dim); font-size:12px; font-weight:500; font-family:'Inter',sans-serif; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

.match-meta {
  display:flex; justify-content:space-between; align-items:center;
  padding:0 16px 10px; font-size:10px; color:var(--dim);
}
.m-group { font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
.m-venue { opacity:.7; }

.filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }

.stats-bar {
  display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px;
  padding:14px 18px; background:var(--card); border:1px solid var(--border);
  border-radius:10px;
}
.stat-item { text-align:center; }
.stat-item .val { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); line-height:1; }
.stat-item .lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }

@media (max-width:600px) {
  .m-team { font-size:12px; gap:5px; }
  .m-flag { font-size:16px; }
  .m-score { font-size:15px; min-width:50px; }
  .match-row { gap:6px; padding:10px 12px; }
  .match-meta { padding:0 12px 8px; }
  .date-btn .day { font-size:15px; }
}
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="tourn-label">FIFA World Cup 2026</div>
    <h1>Match <span>Schedule</span></h1>
    <div class="subtitle">72 group stage matches · 12 venues · Live scores</div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="filter-row">
    <select class="inp" id="f-group" onchange="render()">
      <option value="">All groups</option>
    </select>
    <select class="inp" id="f-status" onchange="render()">
      <option value="">All matches</option>
      <option value="FT">Finished</option>
      <option value="scheduled">Upcoming</option>
    </select>
    <select class="inp" id="f-city" onchange="render()">
      <option value="">All venues</option>
    </select>
  </div>

  <div class="date-nav" id="date-nav"></div>
  <div id="schedule-body"><div style="color:var(--dim);text-align:center;padding:40px">Loading schedule...</div></div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('schedule');

let allMatches = [];

// Team name mapping for flags (schedule may use different names)
const SCHED_NAME_MAP = {
  'Korea Republic':'South Korea',
  'Bosnia and Herzegovina':'Bosnia & Herz.',
  'Ivory Coast':"Côte d'Ivoire",
  'Iran':'IR Iran',
  'Cape Verde':'Cabo Verde',
  'Democratic Republic of the Congo':'DR Congo',
  'United States':'USA',
  'Turkey':'Türkiye',
  'Czech Republic':'Czechia',
};

function flagFor(team) {
  return FLAG_MAP[team] || FLAG_MAP[SCHED_NAME_MAP[team]] || '';
}

function isNorway(t) {
  return t === 'Norway';
}

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${DOW[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;
}

function fmtTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':');
  return `${h}:${m}`;
}

async function loadSchedule() {
  try {
    allMatches = await sb('schedule?select=*&order=match_date,kickoff_time,id');
    populateFilters();
    render();
  } catch(e) {
    document.getElementById('schedule-body').innerHTML =
      `<div style="color:var(--dim);text-align:center;padding:40px">Error: ${e.message}</div>`;
  }
}

function populateFilters() {
  const groups = [...new Set(allMatches.map(m => m.group_name))].sort();
  const cities = [...new Set(allMatches.map(m => m.city))].sort();

  const gSel = document.getElementById('f-group');
  groups.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; gSel.appendChild(o); });

  const cSel = document.getElementById('f-city');
  cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });
}

function render() {
  const grp = document.getElementById('f-group').value;
  const status = document.getElementById('f-status').value;
  const city = document.getElementById('f-city').value;

  let matches = allMatches.filter(m => {
    if (grp && m.group_name !== grp) return false;
    if (status && m.status !== status) return false;
    if (city && m.city !== city) return false;
    return true;
  });

  // Stats bar
  const ft = allMatches.filter(m => m.status === 'FT');
  const totalGoals = ft.reduce((s, m) => s + (m.home_score||0) + (m.away_score||0), 0);
  const avgGoals = ft.length ? (totalGoals / ft.length).toFixed(1) : '0';
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><div class="val">${ft.length}</div><div class="lbl">Played</div></div>
    <div class="stat-item"><div class="val">${allMatches.length - ft.length}</div><div class="lbl">Remaining</div></div>
    <div class="stat-item"><div class="val">${totalGoals}</div><div class="lbl">Goals</div></div>
    <div class="stat-item"><div class="val">${avgGoals}</div><div class="lbl">Per match</div></div>
  `;

  // Group by date
  const byDate = {};
  matches.forEach(m => {
    if (!byDate[m.match_date]) byDate[m.match_date] = [];
    byDate[m.match_date].push(m);
  });
  const dates = Object.keys(byDate).sort();

  // Date nav
  const today = new Date().toISOString().slice(0, 10);
  const allDates = [...new Set(allMatches.map(m => m.match_date))].sort();
  document.getElementById('date-nav').innerHTML = allDates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const isToday = d === today;
    const hasFiltered = byDate[d];
    return `<button class="date-btn${isToday ? ' active' : ''}${!hasFiltered ? ' style="opacity:.3"' : ''}"
      onclick="scrollToDate('${d}')">
      <span class="dow">${DOW[dt.getDay()]}</span>
      <span class="day">${dt.getDate()}</span>
    </button>`;
  }).join('');

  // Render matches
  if (!dates.length) {
    document.getElementById('schedule-body').innerHTML =
      '<div style="color:var(--dim);text-align:center;padding:40px">No matches found</div>';
    return;
  }

  document.getElementById('schedule-body').innerHTML = dates.map(date => {
    const dayMatches = byDate[date];
    return `<div class="day-section" id="day-${date}">
      <div class="day-title">${fmtDate(date)}${date === today ? ' &mdash; Today' : ''}</div>
      <div class="match-list">
        ${dayMatches.map(m => {
          const nor = isNorway(m.home_team) || isNorway(m.away_team);
          const isFt = m.status === 'FT';
          const scoreClass = isFt ? 'ft' : 'sched';
          const scoreText = isFt
            ? `${m.home_score} - ${m.away_score}`
            : (m.kickoff_time ? fmtTime(m.kickoff_time) : 'TBD');

          return `<div class="match-card${nor ? ' norway' : ''}">
            <div class="match-row">
              <div class="m-team home">
                <span>${m.home_team}</span>
                <span class="m-flag">${flagFor(m.home_team)}</span>
              </div>
              <div class="m-score ${scoreClass}">${scoreText}</div>
              <div class="m-team away">
                <span class="m-flag">${flagFor(m.away_team)}</span>
                <span>${m.away_team}</span>
              </div>
            </div>
            <div class="match-meta">
              <span class="m-group">${m.group_name}</span>
              <span class="m-venue">${m.stadium}, ${m.city}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // Auto-scroll to today if it exists
  if (byDate[today] && !grp && !status && !city) {
    setTimeout(() => {
      document.getElementById('day-' + today)?.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 100);
  }
}

function scrollToDate(date) {
  const el = document.getElementById('day-' + date);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}

loadSchedule();
</script>
</body>
</html>
