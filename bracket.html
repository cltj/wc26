<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Bracket</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.bracket-note { font-size:12px; color:var(--dim); margin-bottom:20px; }
#bracket-wrap { overflow-x:auto; padding-bottom:16px; }
.round-filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.round-filters button {
  padding:6px 16px; border:1px solid rgba(255,255,255,0.12); border-radius:6px;
  background:#0e2718; color:#8a9aa0; font-family:'Inter',sans-serif; font-size:13px;
  cursor:pointer; transition:all .15s;
}
.round-filters button.active { background:#0d5228; color:#f0b429; border-color:#f0b429; }
.round-filters button:hover:not(.active) { background:#143a24; }
.compact-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.compact-card {
  background:#0e2718; border:1px solid rgba(255,255,255,0.07); border-radius:8px;
  padding:0; overflow:hidden;
}
.compact-card .cc-header {
  background:#0d5228; padding:4px 10px; font-family:'Bebas Neue',sans-serif;
  color:#f0b429; font-size:11px; letter-spacing:0.5px;
}
.compact-card .cc-row {
  display:flex; align-items:center; padding:8px 10px; gap:6px;
}
.compact-card .cc-row+.cc-row { border-top:1px solid rgba(255,255,255,0.07); }
.compact-card .cc-slot { font-size:8px; color:#8a9aa0; width:48px; flex-shrink:0; font-family:'Inter',sans-serif; }
.compact-card .cc-team { flex:1; font-size:12px; font-family:'Inter',sans-serif; color:#f5f7f2; font-weight:600; }
.compact-card .cc-team.tbd { color:#8a9aa0; font-weight:400; font-size:10px; }
.compact-card .cc-score { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; color:#f0b429; }
.compact-card .cc-elim { color:#5a6a60; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="tourn-label">FIFA World Cup 2026</div>
    <h1>Knockout <span>Bracket</span></h1>
    <div class="subtitle">Round of 32 · Round of 16 · QF · SF · Final</div>
  </div>

  <p class="bracket-note">Group stage ends 27 Jun · R32 starts 28 Jun · Final 19 Jul at MetLife Stadium, New York</p>
  <div class="round-filters" id="round-filters">
    <button class="active" data-round="all">All</button>
    <button data-round="R32">R32</button>
    <button data-round="R16">R16</button>
    <button data-round="QF">QF</button>
    <button data-round="SF">SF / Final</button>
  </div>
  <div id="bracket-wrap"><div id="bracket" style="color:var(--dim);text-align:center;padding:40px">Loading bracket…</div></div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_standings.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('bracket');

const ROUNDS = [
  {name:'Round of 32', dates:'28 Jun–2 Jul'},
  {name:'Round of 16', dates:'4–8 Jul'},
  {name:'Quarter-finals', dates:'9–12 Jul'},
  {name:'Semi-finals', dates:'14–15 Jul'},
  {name:'Final', dates:'19 Jul'},
];

// Determine which team advanced from a knockout game
function getAdvancer(game) {
  if (!game.result) return null;
  if (game.advancer) return game.advancer;
  const [h, a] = game.result.split('-').map(Number);
  if (h > a) return game.home;
  if (a > h) return game.away;
  return null;
}

async function loadBracket() {
  try {
    const allKO = await sb('games?round=neq.group&select=id,home,away,home_slot,away_slot,kickoff,result,round,advancer,et_result,pen_result&order=id');
    const byId = {};
    allKO.forEach(g => byId[g.id] = g);

    // R32: map structure slots to actual games
    const r32Games = allKO.filter(g => g.round === 'R32');
    const r32Resolved = R32_STRUCTURE.map(slot => {
      const game = r32Games.find(g => g.home_slot === slot.top && g.away_slot === slot.bot);
      return {
        topLabel: slot.top,
        topTeam: game?.home || null,
        botLabel: slot.bot,
        botTeam: game?.away || null,
        date: slot.date,
        result: game?.result || null,
        advancer: game ? getAdvancer(game) : null,
        et_result: game?.et_result || null,
        pen_result: game?.pen_result || null,
      };

    });

    // Helper: get team name if known (not a slot placeholder)
    const teamOrNull = (name, slot) => (name && name !== slot) ? name : null;

    // R16: order must match bracket pairs (R32[0]+R32[1]→R16[0], etc.)
    // Build expected R16 order from R32 game IDs
    const r16BySlot = {};
    allKO.filter(g => g.round === 'R16').forEach(g => r16BySlot[g.home_slot] = g);
    const r16Ordered = [];
    for (let i = 0; i < 16; i += 2) {
      const r32Top = r32Games.find(g => g.home_slot === R32_STRUCTURE[i].top && g.away_slot === R32_STRUCTURE[i].bot);
      if (r32Top) {
        const slot = 'W' + r32Top.id;
        r16Ordered.push(r16BySlot[slot] || null);
      } else {
        r16Ordered.push(null);
      }
    }

    // Order later rounds by following the bracket tree
    const orderBySlots = (games, prevOrdered) => {
      const bySlot = {};
      games.forEach(g => bySlot[g.home_slot] = g);
      return prevOrdered.filter(Boolean).reduce((acc, g, i) => {
        if (i % 2 === 0) acc.push(bySlot['W' + g.id] || null);
        return acc;
      }, []);
    };
    const qfGames = allKO.filter(g => g.round === 'QF');
    const sfGames = allKO.filter(g => g.round === 'SF');
    const qfOrdered = orderBySlots(qfGames, r16Ordered);
    const sfOrdered = orderBySlots(sfGames, qfOrdered);

    const rounds = {
      R16: r16Ordered,
      QF: qfOrdered,
      SF: sfOrdered,
      F: allKO.filter(g => g.round === 'F').sort((a,b) => a.id - b.id),
      '3rd': allKO.filter(g => g.round === '3rd').sort((a,b) => a.id - b.id),
    };

    // Store for filter re-rendering
    window._bracketData = { r32: r32Resolved, rounds };
    buildBracket(r32Resolved, rounds);
  } catch(e) {
    document.getElementById('bracket').innerHTML =
      `<div style="color:var(--dim);text-align:center;padding:40px">Error: ${e.message}</div>`;
  }
}

function buildBracket(r32Data, rounds) {
  const wrap = document.getElementById('bracket');
  wrap.innerHTML = '';
  const SH=52,GAP=8,CW=148,CG=32,HDRH=44;
  const matchH=SH*2+GAP*2+8;
  const svgW=(CW+CG)*5+CG, svgH=16*matchH+HDRH+60;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',svgW); svg.setAttribute('height',svgH);
  svg.style.cssText='display:block;min-width:'+svgW+'px';

  // Round headers
  ROUNDS.forEach((r,ri)=>{
    const x=CG+ri*(CW+CG);
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    Object.entries({x,y:4,width:CW,height:36,rx:6,fill:'#0d5228'}).forEach(([k,v])=>rect.setAttribute(k,v));
    svg.appendChild(rect);
    [[r.name,'#f0b429',13,17],[r.dates,'#8a9aa0',9,32]].forEach(([txt,fill,fs,y])=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      Object.entries({'x':x+CW/2,y,fill,'font-size':fs,'font-family':'Bebas Neue,sans-serif','text-anchor':'middle'}).forEach(([k,v])=>t.setAttribute(k,v));
      if(fs===9)t.setAttribute('font-family','Inter,sans-serif');
      t.textContent=txt; svg.appendChild(t);
    });
  });

  function drawMatch(x,yC,tl,tt,bl,bt,result,round,opts){
    const advancer = opts?.advancer || null;
    const etResult = opts?.et_result || null;
    const penResult = opts?.pen_result || null;
    const y=yC-SH-GAP/2,h=SH*2+GAP;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    if(round) g.setAttribute('data-round',round);
    const card=document.createElementNS('http://www.w3.org/2000/svg','rect');
    Object.entries({x,y,width:CW,height:h,rx:6,fill:'#0e2718',stroke:'rgba(255,255,255,0.07)','stroke-width':1}).forEach(([k,v])=>card.setAttribute(k,v));
    g.appendChild(card);
    const div=document.createElementNS('http://www.w3.org/2000/svg','line');
    Object.entries({x1:x+6,y1:yC,x2:x+CW-6,y2:yC,stroke:'rgba(255,255,255,0.07)','stroke-width':1}).forEach(([k,v])=>div.setAttribute(k,v));
    g.appendChild(div);
    // Parse result scores
    let topScore=null, botScore=null;
    if(result){
      const parts=result.split('-');
      if(parts.length===2){ topScore=parts[0]; botScore=parts[1]; }
    }
    // Parse ET / penalty scores for display in brackets
    let topExtra=null, botExtra=null;
    if(penResult){
      const parts=penResult.split('-');
      if(parts.length===2){ topExtra=parts[0]+'p'; botExtra=parts[1]+'p'; }
    } else if(etResult){
      const parts=etResult.split('-');
      if(parts.length===2){ topExtra=parts[0]; botExtra=parts[1]; }
    }
    [[tl,tt,yC-SH/2,topScore,topExtra],[bl,bt,yC+SH/2,botScore,botExtra]].forEach(([lbl,name,my,score,extraScore])=>{
      const isAdv = advancer && name === advancer;
      const isElim = advancer && name && name !== advancer;
      const l=document.createElementNS('http://www.w3.org/2000/svg','text');
      Object.entries({x:x+8,y:my-6,fill:'#8a9aa0','font-size':8,'font-family':'Inter,sans-serif'}).forEach(([k,v])=>l.setAttribute(k,v));
      l.textContent=lbl; g.appendChild(l);
      const n=document.createElementNS('http://www.w3.org/2000/svg','text');
      const isTBD=!name;
      const flag = name ? (FLAG_MAP[name] || '') + ' ' : '';
      const nameFill = isTBD ? '#8a9aa0' : isElim ? '#5a6a60' : '#f5f7f2';
      Object.entries({x:x+8,y:my+8,fill:nameFill,'font-size':isTBD?10:11,'font-weight':isTBD?400:600,'font-family':'Inter,sans-serif'}).forEach(([k,v])=>n.setAttribute(k,v));
      n.textContent=isTBD?'—':flag+name; g.appendChild(n);
      if(score!==null){
        const scoreFill = isElim ? '#5a6a60' : '#f0b429';
        const scoreText = extraScore ? score + ' (' + extraScore + ')' : score;
        const s=document.createElementNS('http://www.w3.org/2000/svg','text');
        Object.entries({x:x+CW-10,y:my+8,fill:scoreFill,'font-size':extraScore?11:13,'font-weight':700,'font-family':'JetBrains Mono,monospace','text-anchor':'end'}).forEach(([k,v])=>s.setAttribute(k,v));
        s.textContent=scoreText; g.appendChild(s);
      }
    });
    svg.appendChild(g);
    return {rightX:x+CW,centerY:yC,topY:yC-SH/2+8,botY:yC+SH/2+8};
  }

  function conn(fx,fty,fby,tx,ty){
    const mx=fx+CG/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${fx} ${fty} H${mx} V${fby} H${mx} V${ty} H${tx}`);
    p.setAttribute('fill','none'); p.setAttribute('stroke','rgba(255,255,255,0.1)'); p.setAttribute('stroke-width','1.5');
    svg.appendChild(p);
  }

  // R32
  const r32c = r32Data.map((m,i) =>
    drawMatch(CG, HDRH+matchH*i+matchH/2, m.topLabel, m.topTeam, m.botLabel, m.botTeam, m.result, 'R32', {advancer:m.advancer, et_result:m.et_result, pen_result:m.pen_result})
  );

  // R16
  const teamOrNull = (name, slot) => (name && name !== slot) ? name : null;
  const r16x=CG+CW+CG, r16c=[];
  for(let i=0;i<8;i++){
    const t=r32c[i*2],b=r32c[i*2+1],yC=(t.centerY+b.centerY)/2;
    const g = rounds.R16[i];
    const tl = g?.home_slot||('W M'+(i*2+1)), bl = g?.away_slot||('W M'+(i*2+2));
    const tt = g ? teamOrNull(g.home, g.home_slot) : null;
    const bt = g ? teamOrNull(g.away, g.away_slot) : null;
    drawMatch(r16x,yC,tl,tt,bl,bt,g?.result||null,'R16',{advancer:g?getAdvancer(g):null,et_result:g?.et_result||null,pen_result:g?.pen_result||null});
    conn(t.rightX,t.topY,t.centerY,r16x,yC-SH/2+8);
    conn(b.rightX,b.centerY,b.botY,r16x,yC+SH/2+8);
    r16c.push({rightX:r16x+CW,centerY:yC,topY:yC-SH/2+8,botY:yC+SH/2+8});
  }

  // QF
  const qfx=r16x+CW+CG, qfc=[];
  for(let i=0;i<4;i++){
    const t=r16c[i*2],b=r16c[i*2+1],yC=(t.centerY+b.centerY)/2;
    const g = rounds.QF[i];
    const tl = g?.home_slot||('W R16-'+(i*2+1)), bl = g?.away_slot||('W R16-'+(i*2+2));
    const tt = g ? teamOrNull(g.home, g.home_slot) : null;
    const bt = g ? teamOrNull(g.away, g.away_slot) : null;
    drawMatch(qfx,yC,tl,tt,bl,bt,g?.result||null,'QF',{advancer:g?getAdvancer(g):null,et_result:g?.et_result||null,pen_result:g?.pen_result||null});
    conn(t.rightX,t.topY,t.centerY,qfx,yC-SH/2+8);
    conn(b.rightX,b.centerY,b.botY,qfx,yC+SH/2+8);
    qfc.push({rightX:qfx+CW,centerY:yC,topY:yC-SH/2+8,botY:yC+SH/2+8});
  }

  // SF
  const sfx=qfx+CW+CG, sfc=[];
  for(let i=0;i<2;i++){
    const t=qfc[i*2],b=qfc[i*2+1],yC=(t.centerY+b.centerY)/2;
    const g = rounds.SF[i];
    const tl = g?.home_slot||('W QF-'+(i*2+1)), bl = g?.away_slot||('W QF-'+(i*2+2));
    const tt = g ? teamOrNull(g.home, g.home_slot) : null;
    const bt = g ? teamOrNull(g.away, g.away_slot) : null;
    drawMatch(sfx,yC,tl,tt,bl,bt,g?.result||null,'SF',{advancer:g?getAdvancer(g):null,et_result:g?.et_result||null,pen_result:g?.pen_result||null});
    conn(t.rightX,t.topY,t.centerY,sfx,yC-SH/2+8);
    conn(b.rightX,b.centerY,b.botY,sfx,yC+SH/2+8);
    sfc.push({rightX:sfx+CW,centerY:yC,topY:yC-SH/2+8,botY:yC+SH/2+8});
  }

  // Final
  const finx=sfx+CW+CG, finY=(sfc[0].centerY+sfc[1].centerY)/2;
  const fg = rounds.F[0];
  drawMatch(finx,finY,fg?.home_slot||'W SF-1',fg?teamOrNull(fg.home,fg.home_slot):null,fg?.away_slot||'W SF-2',fg?teamOrNull(fg.away,fg.away_slot):null,fg?.result||null,'F',{advancer:fg?getAdvancer(fg):null,et_result:fg?.et_result||null,pen_result:fg?.pen_result||null});
  conn(sfc[0].rightX,sfc[0].topY,sfc[0].centerY,finx,finY-SH/2+8);
  conn(sfc[1].rightX,sfc[1].centerY,sfc[1].botY,finx,finY+SH/2+8);

  const addTxt=(x,y,txt,fill,fs)=>{
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    Object.entries({x,y,fill,'font-size':fs,'font-family':'Bebas Neue,sans-serif','text-anchor':'middle','letter-spacing':1}).forEach(([k,v])=>t.setAttribute(k,v));
    t.textContent=txt; svg.appendChild(t);
  };
  addTxt(finx+CW/2,finY-SH-GAP-6,'FINAL · 19 Jul','#f0b429',10);

  // 3rd place match
  const thirdY=finY+SH*2+GAP*4;
  const tg = rounds['3rd']?.[0];
  drawMatch(finx,thirdY,tg?.home_slot||'L SF-1',tg?teamOrNull(tg.home,tg.home_slot):null,tg?.away_slot||'L SF-2',tg?teamOrNull(tg.away,tg.away_slot):null,tg?.result||null,'F',{advancer:tg?getAdvancer(tg):null,et_result:tg?.et_result||null,pen_result:tg?.pen_result||null});
  addTxt(finx+CW/2,thirdY-SH-GAP-6,'3RD PLACE · 18 Jul','#c07840',10);

  svg.setAttribute('height',Math.max(thirdY+SH+GAP+20,svgH));
  wrap.appendChild(svg);
}

loadBracket();

function getMatchesForRound(filter) {
  const d = window._bracketData;
  if (!d) return [];
  const teamOrNull = (name, slot) => (name && name !== slot) ? name : null;
  const ROUND_NAMES = { R32:'Round of 32', R16:'Round of 16', QF:'Quarter-finals', SF:'Semi-finals / Final' };
  if (filter === 'R32') {
    return d.r32.map(m => ({
      topLabel:m.topLabel, topTeam:m.topTeam, botLabel:m.botLabel, botTeam:m.botTeam,
      result:m.result, roundName:ROUND_NAMES.R32, advancer:m.advancer, et_result:m.et_result, pen_result:m.pen_result
    }));
  }
  const extract = (arr, rnd) => (arr||[]).filter(Boolean).map(g => ({
    topLabel:g.home_slot, topTeam:teamOrNull(g.home,g.home_slot),
    botLabel:g.away_slot, botTeam:teamOrNull(g.away,g.away_slot),
    result:g.result||null, roundName:rnd, advancer:getAdvancer(g), et_result:g.et_result||null, pen_result:g.pen_result||null
  }));
  if (filter === 'R16') return extract(d.rounds.R16, ROUND_NAMES.R16);
  if (filter === 'QF') return extract(d.rounds.QF, ROUND_NAMES.QF);
  if (filter === 'SF') {
    return [
      ...extract(d.rounds.SF, 'Semi-finals'),
      ...extract(d.rounds.F, 'Final'),
      ...extract(d.rounds['3rd'], '3rd Place'),
    ];
  }
  return [];
}

function renderCompact(matches) {
  const wrap = document.getElementById('bracket');
  wrap.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'compact-grid';
  matches.forEach(m => {
    const card = document.createElement('div');
    card.className = 'compact-card';
    let topExtra=null, botExtra=null;
    if (m.pen_result) {
      const p=m.pen_result.split('-'); if(p.length===2){topExtra=p[0]+'p';botExtra=p[1]+'p';}
    } else if (m.et_result) {
      const p=m.et_result.split('-'); if(p.length===2){topExtra=p[0];botExtra=p[1];}
    }
    const row = (label, team, score, extraScore) => {
      const flag = team ? (FLAG_MAP[team]||'') + ' ' : '';
      const isElim = m.advancer && team && team !== m.advancer;
      const teamCls = team ? (isElim ? ' cc-elim' : '') : ' tbd';
      const scoreText = score !== null ? (extraScore ? `${score} (${extraScore})` : score) : '';
      return `<div class="cc-row">
        <span class="cc-slot">${label}</span>
        <span class="cc-team${teamCls}">${team ? flag+team : '—'}</span>
        ${scoreText ? `<span class="cc-score${isElim?' cc-elim':''}">${scoreText}</span>` : ''}
      </div>`;
    };
    let topScore=null, botScore=null;
    if (m.result) { const p=m.result.split('-'); if(p.length===2){topScore=p[0];botScore=p[1];} }
    card.innerHTML = `<div class="cc-header">${m.roundName||''}</div>`
      + row(m.topLabel, m.topTeam, topScore, topExtra)
      + row(m.botLabel, m.botTeam, botScore, botExtra);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
}

// Round filter buttons
document.getElementById('round-filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#round-filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const round = btn.dataset.round;
  if (round === 'all') {
    const d = window._bracketData;
    if (d) buildBracket(d.r32, d.rounds);
  } else {
    renderCompact(getMatchesForRound(round));
  }
});
</script>
</body>
</html>
