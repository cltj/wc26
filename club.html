<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Club</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
/* ── Hero ─────────────────────────────────────────────────────────────── */
.club-hero {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 28px; position: relative;
}
.club-hero::after {
  content: '';
  position: absolute; bottom: -14px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--accent, var(--border)), transparent 60%);
}
.hero-logo {
  width: 72px; height: 72px; object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.hero-text { flex: 1; }
.hero-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 1px; line-height: 1;
}
.hero-league {
  font-size: 12px; color: var(--dim); margin-top: 4px;
  display: flex; align-items: center; gap: 8px;
}
.hero-league a { color: var(--dim); text-decoration: none; transition: color .15s; }
.hero-league a:hover { color: var(--gold); }
.hero-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
  background: rgba(255,255,255,.06); color: var(--dim);
}

/* ── Roster stats strip ───────────────────────────────────────────────── */
.roster-strip {
  display: flex; gap: 1px; margin-bottom: 24px;
  background: rgba(255,255,255,.04); border-radius: 8px; overflow: hidden;
}
.rs-cell {
  flex: 1; text-align: center; padding: 14px 8px;
  background: var(--card);
}
.rs-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700;
}
.rs-lbl {
  font-size: 8px; color: var(--dim);
  text-transform: uppercase; letter-spacing: .08em; margin-top: 2px;
}

/* ── Position group ───────────────────────────────────────────────────── */
.pos-group { margin-bottom: 24px; }
.pos-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: .5px;
  color: var(--dim); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.pos-header .pos-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 3px;
}
.pos-gk .pos-tag  { background: rgba(240,180,41,.12); color: var(--gold); }
.pos-df .pos-tag  { background: rgba(96,185,122,.1);  color: var(--green); }
.pos-mf .pos-tag  { background: rgba(122,180,240,.1); color: #7ab4f0; }
.pos-fw .pos-tag  { background: rgba(224,112,112,.1); color: #e07070; }

/* ── Player rows ──────────────────────────────────────────────────────── */
.player-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.player-row:last-child { border-bottom: none; }
.player-row:hover { background: rgba(255,255,255,.025); }

.player-photo {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; background: var(--card2);
  flex-shrink: 0;
  border: 2px solid var(--border);
}
.player-main { flex: 1; min-width: 0; }
.player-name {
  font-weight: 700; font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-sub {
  font-size: 10px; color: var(--dim); margin-top: 1px;
  display: flex; align-items: center; gap: 6px;
}
.player-nat { font-size: 12px; }

.player-data {
  display: flex; gap: 16px; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--dim);
  text-align: right;
}
.player-data .pd-item { min-width: 36px; }
.pd-label {
  font-size: 7px; text-transform: uppercase;
  letter-spacing: .06em; opacity: .6;
}
.pd-val { font-weight: 600; color: var(--white); }

/* ── Transfers section ────────────────────────────────────────────────── */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: .5px;
  color: var(--gold); margin-bottom: 12px; margin-top: 32px;
}
.transfer-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.transfer-row:last-child { border-bottom: none; }
.xfer-dir {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  width: 28px; text-align: center;
  padding: 3px 0; border-radius: 3px;
  flex-shrink: 0;
}
.xfer-in  { background: rgba(96,185,122,.12); color: var(--green); }
.xfer-out { background: rgba(224,112,112,.1);  color: #e07070; }
.xfer-name { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.xfer-club { color: var(--dim); font-size: 11px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
.xfer-fee  { font-family: 'JetBrains Mono', monospace; color: var(--gold); font-size: 11px; flex-shrink: 0; }
.xfer-date { font-family: 'JetBrains Mono', monospace; color: var(--dim); font-size: 10px; flex-shrink: 0; }
.xfer-type-loan { color: #7ab4f0; }
.xfer-type-free { color: var(--green); }

/* ── Back link ────────────────────────────────────────────────────────── */
.back-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--dim); text-decoration: none;
  margin-bottom: 16px; transition: color .15s;
}
.back-link:hover { color: var(--gold); }

/* ── Loading ──────────────────────────────────────────────────────────── */
.status-msg {
  text-align: center; padding: 60px 20px; color: var(--dim); font-size: 13px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.player-row { animation: fadeUp .25s ease both; }

@media (max-width: 600px) {
  .hero-logo { width: 52px; height: 52px; }
  .hero-name { font-size: 26px; }
  .player-data { gap: 10px; }
  .player-data .pd-hide { display: none; }
  .roster-strip { flex-wrap: wrap; }
  .rs-cell { flex: 1 1 25%; min-width: 70px; }
  .transfer-row { font-size: 11px; gap: 6px; }
  .xfer-club { max-width: 100px; }
}
</style>
</head>
<body>
<div class="page">
  <a href="data.html" class="back-link">&larr; All clubs</a>
  <div id="content">
    <div class="status-msg" id="status">Loading club...</div>
  </div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('data');

const params = new URLSearchParams(location.search);
const clubId = params.get('id');

if (!clubId) {
  document.getElementById('status').textContent = 'No club specified.';
} else {
  loadClub(clubId);
}

function calcAge(dob) {
  if (!dob) return null;
  const d = new Date(dob), now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  if (now.getMonth() < d.getMonth() || (now.getMonth() === d.getMonth() && now.getDate() < d.getDate())) age--;
  return age;
}

function posGroup(pos) {
  if (!pos) return 'MF';
  const p = pos.toUpperCase();
  if (p === 'GK' || p === 'G') return 'GK';
  if (['DF','CB','LB','RB','LWB','RWB'].includes(p)) return 'DF';
  if (['FW','CF','LW','RW','ST','SS','F'].includes(p)) return 'FW';
  return 'MF';
}

const POS_ORDER = { GK: 0, DF: 1, MF: 2, FW: 3 };
const POS_LABEL = { GK: 'Goalkeepers', DF: 'Defenders', MF: 'Midfielders', FW: 'Forwards' };

async function loadClub(id) {
  const status = document.getElementById('status');
  try {
    const [clubs, players, transfers] = await Promise.all([
      sb(`club_teams?select=*&id=eq.${id}`),
      sb(`players?select=id,name,short_name,primary_position,date_of_birth,height_cm,weight_kg,image_url,espn_id,national_teams:nationality_id(name,flag_emoji)&current_club_id=eq.${id}&order=name`),
      sb(`transfers?select=*,players!transfers_player_id_fkey(name),from:club_teams!transfers_from_club_id_fkey(name),to:club_teams!transfers_to_club_id_fkey(name)&or=(from_club_id.eq.${id},to_club_id.eq.${id})&order=transfer_date.desc.nullslast&limit=50`),
    ]);

    if (!clubs.length) { status.textContent = 'Club not found.'; return; }
    const club = clubs[0];
    document.title = `WC 2026 – ${club.name}`;

    const accent = club.color && club.color !== '000000' ? '#' + club.color : null;
    if (accent) document.documentElement.style.setProperty('--accent', accent);

    // Find league name
    let leagueName = club.league_espn_code;
    try {
      const lg = await sb(`leagues?select=name&espn_code=eq.${encodeURIComponent(club.league_espn_code)}&limit=1`);
      if (lg.length) leagueName = lg[0].name;
    } catch(e) {}

    // Group players by position
    const groups = { GK: [], DF: [], MF: [], FW: [] };
    players.forEach(p => {
      const g = posGroup(p.primary_position);
      groups[g].push(p);
    });

    // Roster stats
    const avgAge = players.filter(p => p.date_of_birth).length
      ? (players.filter(p => p.date_of_birth).reduce((s, p) => s + calcAge(p.date_of_birth), 0) / players.filter(p => p.date_of_birth).length).toFixed(1)
      : '-';
    const avgHeight = players.filter(p => p.height_cm).length
      ? Math.round(players.filter(p => p.height_cm).reduce((s, p) => s + p.height_cm, 0) / players.filter(p => p.height_cm).length)
      : '-';
    const nationalities = new Set(players.map(p => p.national_teams?.name).filter(Boolean)).size;

    let html = `
      <div class="club-hero">
        <img class="hero-logo" src="${club.logo_url || ''}" alt="" onerror="this.style.display='none'">
        <div class="hero-text">
          <div class="hero-name">${club.name}</div>
          <div class="hero-league">
            <a href="data.html">${leagueName}</a>
            <span class="hero-badge">${club.short_name || club.league_espn_code}</span>
            ${club.country_code ? `<span class="hero-badge">${club.country_code}</span>` : ''}
          </div>
        </div>
      </div>

      <div class="roster-strip">
        <div class="rs-cell"><div class="rs-val">${players.length}</div><div class="rs-lbl">Players</div></div>
        <div class="rs-cell"><div class="rs-val">${avgAge}</div><div class="rs-lbl">Avg Age</div></div>
        <div class="rs-cell"><div class="rs-val">${avgHeight === '-' ? '-' : avgHeight + ' cm'}</div><div class="rs-lbl">Avg Height</div></div>
        <div class="rs-cell"><div class="rs-val">${nationalities}</div><div class="rs-lbl">Nations</div></div>
        <div class="rs-cell"><div class="rs-val">${groups.GK.length}</div><div class="rs-lbl">GK</div></div>
        <div class="rs-cell"><div class="rs-val">${groups.DF.length}</div><div class="rs-lbl">DEF</div></div>
        <div class="rs-cell"><div class="rs-val">${groups.MF.length}</div><div class="rs-lbl">MID</div></div>
        <div class="rs-cell"><div class="rs-val">${groups.FW.length}</div><div class="rs-lbl">FWD</div></div>
      </div>
    `;

    // Render position groups
    for (const [g, label] of Object.entries(POS_LABEL)) {
      const list = groups[g];
      if (!list.length) continue;
      html += `<div class="pos-group pos-${g.toLowerCase()}">
        <div class="pos-header">${label} <span class="pos-tag">${list.length}</span></div>`;
      html += list.map((p, i) => {
        const age = calcAge(p.date_of_birth);
        const nat = p.national_teams;
        return `<div class="player-row" style="animation-delay:${i * 30}ms">
          <img class="player-photo" src="${p.image_url || ''}" alt="" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><rect fill=%22%23112b1a%22 width=%2236%22 height=%2236%22/></svg>'">
          <div class="player-main">
            <div class="player-name">${p.name}</div>
            <div class="player-sub">
              ${nat ? `<span class="player-nat">${nat.flag_emoji || ''}</span> ${nat.name || ''}` : ''}
            </div>
          </div>
          <div class="player-data">
            <div class="pd-item">
              <div class="pd-label">Pos</div>
              <div class="pd-val">${p.primary_position || '-'}</div>
            </div>
            <div class="pd-item">
              <div class="pd-label">Age</div>
              <div class="pd-val">${age !== null ? age : '-'}</div>
            </div>
            <div class="pd-item pd-hide">
              <div class="pd-label">Ht</div>
              <div class="pd-val">${p.height_cm || '-'}</div>
            </div>
            <div class="pd-item pd-hide">
              <div class="pd-label">Wt</div>
              <div class="pd-val">${p.weight_kg || '-'}</div>
            </div>
          </div>
        </div>`;
      }).join('');
      html += '</div>';
    }

    // Transfers
    if (transfers.length) {
      html += `<div class="section-title">Recent Transfers</div>`;
      html += transfers.map(t => {
        const isIn = String(t.to_club_id) === String(id);
        const otherClub = isIn ? (t.from?.name || 'Unknown') : (t.to?.name || 'Unknown');
        const fee = t.fee_eur ? (t.fee_eur >= 1e6 ? `\u20AC${(t.fee_eur/1e6).toFixed(1)}M` : `\u20AC${(t.fee_eur/1e3).toFixed(0)}K`) : '';
        const typeClass = t.type === 'loan' ? 'xfer-type-loan' : t.type === 'free' ? 'xfer-type-free' : '';
        return `<div class="transfer-row">
          <span class="xfer-dir ${isIn ? 'xfer-in' : 'xfer-out'}">${isIn ? 'IN' : 'OUT'}</span>
          <span class="xfer-name">${t.players?.name || '?'}</span>
          <span class="xfer-club">${isIn ? 'from ' : 'to '}${otherClub}</span>
          <span class="xfer-fee ${typeClass}">${fee || t.type || ''}</span>
          <span class="xfer-date">${t.transfer_date || ''}</span>
        </div>`;
      }).join('');
    }

    document.getElementById('content').innerHTML = html;
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
