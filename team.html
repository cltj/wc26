<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Team</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.team-hero { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
.hero-flag { font-size:56px; line-height:1; }
.hero-name { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:1px; }
.hero-meta { font-size:13px; color:var(--dim); margin-top:2px; }
.hero-conf { font-size:11px; color:var(--dim); }

.section-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.5px; color:var(--gold); margin-bottom:10px; margin-top:28px; }
.section-sub { font-size:10px; color:var(--dim); margin-bottom:12px; font-style:italic; }

/* Stats bar */
.team-stats-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:1px; background:rgba(255,255,255,.06); border-radius:8px; overflow:hidden; margin-bottom:24px; }
.ts-cell { background:var(--card); text-align:center; padding:12px 6px; }
.ts-val { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; }
.ts-lbl { font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

/* Form */
.form-row { display:flex; gap:4px; margin-bottom:8px; }
.form-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
.form-w { background:rgba(96,185,122,.2); color:var(--green); }
.form-d { background:rgba(240,180,41,.15); color:var(--gold); }
.form-l { background:rgba(224,52,52,.15); color:#e07070; }
.form-u { background:rgba(255,255,255,.05); color:var(--dim); }
.form-detail { font-size:11px; color:var(--dim); line-height:1.8; }
.form-score { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--text); }

/* ── Pitch formation ───────────────────────────────────────────────── */
.pitch {
  position:relative;
  background: linear-gradient(180deg, #1b6b35 0%, #17612e 20%, #1a6b35 20.5%, #17612e 40%, #1a6b35 40.5%, #17612e 60%, #1a6b35 60.5%, #17612e 80%, #1a6b35 80.5%, #17612e 100%);
  border-radius:10px;
  border:2px solid rgba(255,255,255,.18);
  padding:16px 8px;
  overflow:hidden;
  max-width:460px;
  margin:0 auto 24px;
}
/* Pitch markings */
.pitch::before {
  content:'';
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:80px; height:80px; border-radius:50%;
  border:2px solid rgba(255,255,255,.12);
}
.pitch::after {
  content:'';
  position:absolute; left:50%; transform:translateX(-50%);
  bottom:0; width:140px; height:48px;
  border:2px solid rgba(255,255,255,.12);
  border-bottom:none;
  border-radius:6px 6px 0 0;
}
.pitch-half {
  position:absolute; left:10%; right:10%; top:50%;
  border-top:2px solid rgba(255,255,255,.12);
}
.pitch-row {
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  padding:10px 4px;
  position:relative;
  z-index:1;
}
.pitch-row.gk-row { padding:14px 4px 6px; }
.pp {
  display:flex; flex-direction:column; align-items:center;
  width:56px;
}
.pp-circle {
  width:34px; height:34px; border-radius:50%;
  background:rgba(0,0,0,.45); border:2px solid rgba(255,255,255,.5);
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700;
  color:#fff; margin-bottom:3px;
}
.pp.gk .pp-circle { background:rgba(240,180,41,.3); border-color:var(--gold); }
.pp-name {
  font-size:8px; font-weight:600; color:#fff; text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.6);
  line-height:1.2; max-width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.pitch-formation-label {
  text-align:center; font-family:'JetBrains Mono',monospace;
  font-size:13px; font-weight:700; color:var(--gold);
  margin-bottom:6px;
}

/* Roster table */
.roster-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.roster { width:100%; border-collapse:collapse; font-size:12px; }
.roster th { text-align:left; font-size:9px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); padding:8px 6px; border-bottom:1px solid var(--border); white-space:nowrap; position:relative; }
.roster th.num-col { text-align:center; width:32px; }
.roster th.stat-col { text-align:center; width:40px; }
.roster td { padding:8px 6px; border-bottom:1px solid rgba(255,255,255,.03); }
.roster td.num-col { text-align:center; font-family:'JetBrains Mono',monospace; color:var(--gold); font-weight:600; }
.roster td.stat-col { text-align:center; font-family:'JetBrains Mono',monospace; }
.roster tr:hover { background:rgba(255,255,255,.02); }
.roster .player-name { font-weight:600; }
.roster .player-club { font-size:10px; color:var(--dim); margin-top:1px; }
.roster .pos-badge { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:600; }
.pos-gk { background:rgba(240,180,41,.15); color:var(--gold); }
.pos-df { background:rgba(59,130,246,.12); color:#7cb3f4; }
.pos-mf { background:rgba(96,185,122,.12); color:var(--green); }
.pos-fw { background:rgba(224,52,52,.12); color:#e07070; }
.stat-highlight { color:var(--green); font-weight:700; }
.stat-yellow { color:#f0b429; }
.stat-red { color:#e07070; }
.sub-header { font-size:11px; color:var(--dim); padding:12px 6px 6px; border-bottom:1px solid var(--border); font-weight:600; text-transform:uppercase; letter-spacing:.06em; }

/* WC ranking */
.ranking-badge { display:inline-flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:13px; margin-right:10px; margin-bottom:8px; }
.ranking-pos { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold); }

/* Hot/Cold players */
.hc-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:8px; }
@media (max-width:500px) { .hc-grid { grid-template-columns:1fr; } }
.hc-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; }
.hc-box.hot { border-color:rgba(96,185,122,.25); }
.hc-box.cold { border-color:rgba(224,52,52,.2); }
.hc-label { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin-bottom:8px; font-weight:600; }
.hc-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12px; }
.hc-rank { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); min-width:30px; }
.hc-name { font-weight:600; flex:1; }
.hc-stat { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; }
.hc-stat.hot { color:var(--green); }
.hc-stat.cold { color:#e07070; }
.hc-cols { font-family:'JetBrains Mono',monospace; font-size:11px; min-width:24px; text-align:center; }
.hc-header { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; padding-bottom:2px; border-bottom:1px solid var(--border); margin-bottom:2px; }
.hc-header .hc-rank, .hc-header .hc-name, .hc-header .hc-cols { font-family:'Inter',sans-serif; font-weight:600; }

/* Help tooltip */
.help-q { display:inline-flex; align-items:center; justify-content:center; width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,.1); color:var(--dim); font-size:8px; font-weight:700; cursor:pointer; vertical-align:middle; margin-left:2px; }
.help-q:hover { background:rgba(255,255,255,.2); color:var(--gold); }
.help-tip { display:none; position:absolute; background:var(--card); border:1px solid var(--gold); border-radius:6px; padding:6px 10px; font-size:10px; color:var(--text); white-space:nowrap; z-index:20; box-shadow:0 4px 12px rgba(0,0,0,.4); font-weight:400; text-transform:none; letter-spacing:0; margin-top:4px; }
.help-tip.show { display:block; }

.loading { color:var(--dim); font-size:13px; text-align:center; padding:40px; }
.back-links { display:flex; gap:16px; margin-bottom:16px; }
.back-link { font-size:12px; color:var(--dim); display:inline-block; text-decoration:none; }
.back-link:hover { color:var(--gold); }
</style>
</head>
<body>
<div class="page">
  <div id="team-loading" class="loading">Loading team...</div>
  <div id="team-content" style="display:none">
    <div class="back-links">
      <a href="index.html" class="back-link">&larr; League</a>
      <a href="teams.html" class="back-link">&larr; All teams</a>
    </div>
    <div id="hero"></div>
    <div id="stats-bar"></div>
    <div id="wc-ranking"></div>
    <div id="hot-cold"></div>
    <div id="form-section"></div>
    <div id="lineup-section"></div>
    <div id="roster-section"></div>
  </div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('teams');

const params = new URLSearchParams(location.search);
const teamName = params.get('team');

if (!teamName) {
  document.getElementById('team-loading').textContent = 'No team specified.';
} else {
  loadTeam(teamName);
}

function calcAge(dobStr) {
  if (!dobStr) return null;
  const dob = new Date(dobStr);
  const now = new Date();
  let age = now.getFullYear() - dob.getFullYear();
  if (now.getMonth() < dob.getMonth() || (now.getMonth() === dob.getMonth() && now.getDate() < dob.getDate())) age--;
  return age;
}

function posGroup(pos) {
  if (!pos) return 'MF';
  const p = pos.toUpperCase();
  if (p === 'GK' || p === 'G') return 'GK';
  if (['DF','CB','LB','RB','LWB','RWB'].includes(p) || p.match(/^(CD|CB|LB|RB|LWB|RWB)/)) return 'DF';
  if (['FW','CF','LW','RW','ST','SS','F'].includes(p) || p.match(/^(CF|F|LW|RW|ST|SS|RF|LF)/)) return 'FW';
  return 'MF';
}

// Get best display position
function displayPos(player) {
  return player.position || player.primary_position || '—';
}

// ── Position ranking for formation row assignment ──
// Lower = more defensive (GK=0, DEF=1, MID=2-3, FW=4)
function posRank(pos) {
  if (!pos) return 2;
  const p = pos.toUpperCase();
  if (p === 'G' || p === 'GK') return 0;  // Goalkeeper
  if (p.match(/^(CD|CB|LB|RB|LWB|RWB)/)) return 1;  // Defenders
  if (p.match(/^(DM|CDM|CM)/)) return 2; // Defensive/central midfield
  if (p.match(/^(AM|CAM|LM|RM)/)) return 3; // Attacking mid / wide mid
  if (p.match(/^(CF|F|LW|RW|ST|SS)/)) return 4; // Forwards
  return 2;
}

// Build formation pitch HTML from starting XI and formation string
function buildPitchHtml(xi, formation) {
  if (!xi.length || !formation) return '';

  // Parse formation: "4-2-3-1" → [4,2,3,1]
  const layers = formation.split('-').map(Number).filter(n => !isNaN(n) && n > 0);
  if (!layers.length) return '';

  // Separate GK from outfield
  const gk = xi.find(p => posRank(p.position) === 0);
  const outfield = xi.filter(p => posRank(p.position) !== 0);

  // Sort outfield by defensive-to-offensive position
  outfield.sort((a, b) => posRank(a.position) - posRank(b.position));

  // Assign players to formation rows (defense → attack)
  const rows = [];
  let idx = 0;
  for (const count of layers) {
    rows.push(outfield.slice(idx, idx + count));
    idx += count;
  }
  // If any leftover (shouldn't happen), add to last row
  if (idx < outfield.length) rows[rows.length - 1].push(...outfield.slice(idx));

  // Render: forwards at top, GK at bottom
  const reversedRows = [...rows].reverse();

  let html = `<div class="pitch-formation-label">${formation}</div><div class="pitch">`;
  html += '<div class="pitch-half"></div>';

  // Outfield rows (forwards first)
  reversedRows.forEach(row => {
    html += '<div class="pitch-row">';
    row.forEach(p => {
      html += `<div class="pp"><div class="pp-circle">${p.number}</div><div class="pp-name">${p.short || p.name}</div></div>`;
    });
    html += '</div>';
  });

  // GK row
  if (gk) {
    html += `<div class="pitch-row gk-row"><div class="pp gk"><div class="pp-circle">${gk.number}</div><div class="pp-name">${gk.short || gk.name}</div></div></div>`;
  }

  html += '</div>';
  return html;
}

// Sort by stats: goals desc, assists desc, yellows desc, reds desc
function statSort(a, b) {
  return (b.goals||0) - (a.goals||0)
      || (b.assists||0) - (a.assists||0)
      || (b.yellow_cards||0) - (a.yellow_cards||0)
      || (b.red_cards||0) - (a.red_cards||0);
}

function rosterRow(p) {
  const pos = displayPos(p);
  const pg = posGroup(pos);
  const age = calcAge(p.date_of_birth);
  return `<tr>
    <td><span class="player-name">${p.short_name || p.last_name || p.name}</span>
      <div class="player-club">${p.club||''}</div></td>
    <td><span class="pos-badge pos-${pg.toLowerCase()}">${pos}</span></td>
    <td class="stat-col">${age !== null ? age : '—'}</td>
    <td class="stat-col">${p.matches_played||0}</td>
    <td class="stat-col ${p.goals?'stat-highlight':''}">${p.goals||0}</td>
    <td class="stat-col ${p.assists?'stat-highlight':''}">${p.assists||0}</td>
    <td class="stat-col ${p.yellow_cards?'stat-yellow':''}">${p.yellow_cards||0}</td>
    <td class="stat-col ${p.red_cards?'stat-red':''}">${p.red_cards||0}</td>
  </tr>`;
}

async function loadTeam(name) {
  const loading = document.getElementById('team-loading');
  const content = document.getElementById('team-content');

  try {
    // Fetch team, squad (via squad_players), schedule, stats, and player_matches
    const natTeamP = sb(`national_teams?select=id&name=eq.${encodeURIComponent(name)}`);

    const [teams, schedule, statsAll, natTeamRows] = await Promise.all([
      loadTournamentTeams().then(all => all.filter(t => t.name === name)),
      sb('schedule?select=home_team,away_team,home_score,away_score,status,group_name&order=id'),
      sb('player_stats?select=*'),
      natTeamP,
    ]);

    const natTeamId = natTeamRows?.[0]?.id;
    const statsById = {};
    statsAll.forEach(s => statsById[s.player_id] = s);

    // Load squad for this team via squad_players join
    const squadRaw = natTeamId
      ? await sb(`squad_players?select=position,players!inner(id,name,first_name,last_name,short_name,date_of_birth,primary_position,image_url,nationality_id,club_teams:current_club_id(name))&league_code=eq.FIFA.WORLD&national_team_id=eq.${natTeamId}&order=players(name)`)
      : [];

    // Flatten squad into player objects matching old format
    const players = squadRaw.map(sq => {
      const p = sq.players;
      const s = statsById[p.id] || {};
      const ct = p.club_teams || {};
      return {
        id: p.id,
        name: p.name,
        last_name: p.last_name,
        short_name: p.short_name,
        position: sq.position || p.primary_position || '',
        primary_position: p.primary_position,
        club: ct.name || '',
        date_of_birth: p.date_of_birth,
        image_url: p.image_url,
        goals: s.goals || 0,
        assists: s.assists || 0,
        yellow_cards: s.yellow_cards || 0,
        red_cards: s.red_cards || 0,
        matches_played: s.matches_played || 0,
      };
    });

    // All players for tournament ranking (via squad_players + stats)
    const allSquadRaw = await sb(
      `squad_players?select=players!inner(id,name),national_teams:national_team_id(name)&league_code=eq.FIFA.WORLD`
    );
    const allPlayers = allSquadRaw.map(sq => {
      const s = statsById[sq.players.id] || {};
      return {
        name: sq.players.name,
        team_name: sq.national_teams?.name || '',
        goals: s.goals || 0,
        assists: s.assists || 0,
        yellow_cards: s.yellow_cards || 0,
        red_cards: s.red_cards || 0,
        matches_played: s.matches_played || 0,
      };
    });

    // Player matches for this team
    const playerIds = players.map(p => p.id);
    const playerMatches = playerIds.length
      ? await sb(`player_matches?select=*&player_id=in.(${playerIds.join(',')})&order=game_id`)
      : [];

    // Build lookup: player_id → latest player_matches entry
    const pmByPlayer = {};
    const pmAllByPlayer = {};
    playerMatches.forEach(pm => {
      pmByPlayer[pm.player_id] = pm; // last one wins (ordered by game_id)
      if (!pmAllByPlayer[pm.player_id]) pmAllByPlayer[pm.player_id] = [];
      pmAllByPlayer[pm.player_id].push(pm);
    });

    if (!teams.length) { loading.textContent = `Team "${name}" not found.`; return; }
    const team = teams[0];
    const flag = FLAG_MAP[name] || team.flag_emoji || '';

    document.title = `WC 2026 – ${name}`;

    // Hero
    document.getElementById('hero').innerHTML = `
      <div class="team-hero">
        <div class="hero-flag">${flag}</div>
        <div>
          <div class="hero-name">${name}</div>
          <div class="hero-meta">Group ${team.group_letter}</div>
          <div class="hero-conf">${team.confederation || ''}</div>
        </div>
      </div>`;

    // Match data
    const SCHED_ALIAS = {'South Korea':'Korea Republic','Bosnia & Herz.':'Bosnia and Herzegovina',
      "Côte d'Ivoire":'Ivory Coast','IR Iran':'Iran','Cabo Verde':'Cape Verde',
      'DR Congo':'Democratic Republic of the Congo','USA':'United States',
      'Türkiye':'Turkey','Czechia':'Czech Republic'};
    const aliases = [name, SCHED_ALIAS[name]].filter(Boolean).map(n => n.toLowerCase());
    const matches = schedule.filter(m => {
      if (m.status !== 'FT') return false;
      return aliases.includes(m.home_team?.toLowerCase()) || aliases.includes(m.away_team?.toLowerCase());
    });

    let pld=0, w=0, d=0, l=0, gf=0, ga=0;
    const results = [];
    matches.forEach(m => {
      const isHome = aliases.includes(m.home_team?.toLowerCase());
      const hs = m.home_score, as = m.away_score;
      const mGf = isHome?hs:as, mGa = isHome?as:hs;
      pld++; gf += mGf; ga += mGa;
      let res; if (mGf>mGa) { w++; res='W'; } else if (mGf<mGa) { l++; res='L'; } else { d++; res='D'; }
      const opp = isHome ? m.away_team : m.home_team;
      const oppFlag = FLAG_MAP[opp]||'';
      results.push({ opp, oppFlag, gf:mGf, ga:mGa, res, isHome });
    });

    // Stats bar
    document.getElementById('stats-bar').innerHTML = `
      <div class="team-stats-bar">
        <div class="ts-cell"><div class="ts-val">${pld}</div><div class="ts-lbl">Played</div></div>
        <div class="ts-cell"><div class="ts-val" style="color:var(--green)">${w}</div><div class="ts-lbl">Won</div></div>
        <div class="ts-cell"><div class="ts-val">${d}</div><div class="ts-lbl">Drawn</div></div>
        <div class="ts-cell"><div class="ts-val" style="color:#e07070">${l}</div><div class="ts-lbl">Lost</div></div>
        <div class="ts-cell"><div class="ts-val">${gf}</div><div class="ts-lbl">GF</div></div>
        <div class="ts-cell"><div class="ts-val" style="color:${ga>0?'#e07070':'var(--dim)'}">${ga}</div><div class="ts-lbl">GA</div></div>
        <div class="ts-cell"><div class="ts-val" style="color:${gf-ga>0?'var(--green)':gf-ga<0?'#e07070':'var(--dim)'}">${gf-ga>0?'+':''}${gf-ga}</div><div class="ts-lbl">GD</div></div>
        <div class="ts-cell"><div class="ts-val" style="color:var(--gold)">${w*3+d}</div><div class="ts-lbl">Points</div></div>
      </div>`;

    // WC Ranking
    const allTeams = await loadTournamentTeams();
    const teamStats = {};
    allTeams.forEach(t => { teamStats[t.name] = { pts:0, gf:0, name:t.name }; });
    schedule.filter(m => m.status === 'FT').forEach(m => {
      const mapName = n => {
        const rev = {};
        Object.entries(SCHED_ALIAS).forEach(([k,v]) => rev[v.toLowerCase()] = k);
        return rev[n.toLowerCase()] || allTeams.find(t => t.name.toLowerCase() === n.toLowerCase())?.name || n;
      };
      const home = mapName(m.home_team), away = mapName(m.away_team);
      if (!teamStats[home] || !teamStats[away]) return;
      const hs = m.home_score, as = m.away_score;
      teamStats[home].gf += hs; teamStats[away].gf += as;
      if (hs > as) { teamStats[home].pts += 3; }
      else if (hs < as) { teamStats[away].pts += 3; }
      else { teamStats[home].pts += 1; teamStats[away].pts += 1; }
    });
    const ranked = Object.values(teamStats).sort((a,b) => b.pts - a.pts || b.gf - a.gf);
    const myRankPts = ranked.findIndex(t => t.name === name) + 1;
    const goalRanked = [...ranked].sort((a,b) => b.gf - a.gf);
    const myRankGf = goalRanked.findIndex(t => t.name === name) + 1;

    document.getElementById('wc-ranking').innerHTML = `
      <div class="section-title">Tournament Ranking</div>
      <div>
        <span class="ranking-badge"><span class="ranking-pos">#${myRankPts}</span> by points (${w*3+d} pts)</span>
        <span class="ranking-badge"><span class="ranking-pos">#${myRankGf}</span> by goals scored (${gf})</span>
      </div>`;

    // ── Hot & Cold players ──
    // Rank all tournament players by goals+assists and by cards
    const allSorted = allPlayers.filter(p => (p.goals||0)+(p.assists||0) > 0)
      .sort((a,b) => ((b.goals||0)+(b.assists||0)) - ((a.goals||0)+(a.assists||0)));
    const allCarded = allPlayers.filter(p => (p.yellow_cards||0)+(p.red_cards||0) > 0)
      .sort((a,b) => ((b.yellow_cards||0)+(b.red_cards||0)*3) - ((a.yellow_cards||0)+(a.red_cards||0)*3));

    const teamHot = players.filter(p => (p.goals||0)+(p.assists||0) > 0)
      .sort((a,b) => ((b.goals||0)+(b.assists||0)) - ((a.goals||0)+(a.assists||0)))
      .slice(0, 3);
    const teamCold = players.filter(p => (p.yellow_cards||0)+(p.red_cards||0) > 0)
      .sort((a,b) => ((b.yellow_cards||0)+(b.red_cards||0)*3) - ((a.yellow_cards||0)+(a.red_cards||0)*3))
      .slice(0, 3);

    function findRank(p, list, scoreFn) {
      const myScore = scoreFn(p);
      return list.filter(x => scoreFn(x) > myScore).length + 1;
    }

    let hotColdHtml = '';
    if (teamHot.length || teamCold.length) {
      hotColdHtml = '<div class="hc-grid">';
      if (teamHot.length) {
        hotColdHtml += `<div class="hc-box hot"><div class="hc-label">Hot Players</div>
          <div class="hc-row hc-header">
            <span class="hc-rank">WC#</span>
            <span class="hc-name">Name</span>
            <span class="hc-cols">G</span><span class="hc-cols">A</span><span class="hc-cols">P</span>
          </div>`;
        teamHot.forEach(p => {
          const g = p.goals||0, a = p.assists||0, pts = g + a;
          const rank = findRank(p, allSorted, x => (x.goals||0)+(x.assists||0));
          hotColdHtml += `<div class="hc-row">
            <span class="hc-rank">#${rank}</span>
            <span class="hc-name">${p.short_name||p.last_name||p.name}</span>
            <span class="hc-cols hc-stat hot">${g}</span><span class="hc-cols hc-stat hot">${a}</span><span class="hc-cols hc-stat hot">${pts}</span>
          </div>`;
        });
        hotColdHtml += '</div>';
      }
      if (teamCold.length) {
        hotColdHtml += `<div class="hc-box cold"><div class="hc-label">Disciplinary</div>
          <div class="hc-row hc-header">
            <span class="hc-rank">WC#</span>
            <span class="hc-name">Name</span>
            <span class="hc-cols">Y</span><span class="hc-cols">R</span>
          </div>`;
        teamCold.forEach(p => {
          const y = p.yellow_cards||0, r = p.red_cards||0;
          const rank = findRank(p, allCarded, x => (x.yellow_cards||0)+(x.red_cards||0)*3);
          hotColdHtml += `<div class="hc-row">
            <span class="hc-rank">#${rank}</span>
            <span class="hc-name">${p.short_name||p.last_name||p.name}</span>
            <span class="hc-cols hc-stat cold">${y}</span><span class="hc-cols hc-stat cold">${r}</span>
          </div>`;
        });
        hotColdHtml += '</div>';
      }
      hotColdHtml += '</div>';
    }
    document.getElementById('hot-cold').innerHTML = hotColdHtml;

    // Form
    const form = results.slice(-5);
    const formDots = Array(5).fill(null).map((_,i) => {
      const r = form[i]?.res || 'U';
      return `<div class="form-dot form-${r.toLowerCase()}">${r}</div>`;
    }).join('');
    const resultsHtml = results.map(r =>
      `<div>${r.isHome?'vs':'@'} ${r.oppFlag} ${r.opp} <span class="form-score">${r.gf}-${r.ga}</span></div>`
    ).join('');

    document.getElementById('form-section').innerHTML = `
      <div class="section-title">Form</div>
      <div class="form-row">${formDots}</div>
      ${resultsHtml ? `<div class="form-detail">${resultsHtml}</div>` : '<div class="form-detail">No matches played yet</div>'}`;

    // ── Lineup on a pitch ──
    let xi = team.last_starting_xi || [];
    let formation = team.last_formation || '';

    // Norway override: ESPN reports 4-4-2 but they play 4-3-3
    if (name === 'Norway' && xi.length) {
      formation = '4-3-3';
      xi = xi.map(p => {
        const n = (p.short||p.name||'').toLowerCase();
        // Nusa is LW, Sørloth is RW (ESPN has them as LM/CF-R)
        if (n.includes('nusa')) return { ...p, position: 'LW' };
        if (n.includes('rloth') || n.includes('sørloth')) return { ...p, position: 'RW' };
        // Ødegaard is AM (ESPN has him as RM)
        if (n.includes('degaard')) return { ...p, position: 'AM' };
        // Ryerson is RB (ensure defense)
        if (n.includes('ryerson')) return { ...p, position: 'RB' };
        return p;
      });
    }

    let lineupHtml = '';
    if (xi.length) {
      lineupHtml = `
        <div class="section-title">Last Starting Lineup</div>
        <div class="section-sub">Formation and positions as reported by ESPN for the most recent match</div>
        ${buildPitchHtml(xi, formation)}`;
    }
    document.getElementById('lineup-section').innerHTML = lineupHtml;

    // ── Roster ──
    // Use player_matches data to split roster: starters / subs / rest
    // Find the latest game_id that has player_matches for this team
    const latestGameId = playerMatches.length ? Math.max(...playerMatches.map(pm => pm.game_id)) : null;
    const lastMatchPMs = latestGameId ? playerMatches.filter(pm => pm.game_id === latestGameId) : [];

    const starterIds = new Set(lastMatchPMs.filter(pm => pm.started).map(pm => pm.player_id));
    const subInIds = new Set(lastMatchPMs.filter(pm => pm.subbed_in).map(pm => pm.player_id));

    const starters = [];
    const substitutes = [];
    const unused = [];

    players.forEach(p => {
      if (starterIds.has(p.id)) {
        starters.push(p);
      } else if (subInIds.has(p.id)) {
        substitutes.push(p);
      } else {
        unused.push(p);
      }
    });

    starters.sort(statSort);
    substitutes.sort(statSort);
    unused.sort((a,b) => {
      const pg = { GK:0, DF:1, MF:2, FW:3 };
      const posA = displayPos(a), posB = displayPos(b);
      return (pg[posGroup(posA)]??2) - (pg[posGroup(posB)]??2) || a.name.localeCompare(b.name);
    });

    const thead = `<thead><tr>
      <th>Player</th>
      <th>Pos</th>
      <th class="stat-col">Age</th>
      <th class="stat-col">MP</th>
      <th class="stat-col">G</th>
      <th class="stat-col">A</th>
      <th class="stat-col">Y</th>
      <th class="stat-col">R</th>
    </tr></thead>`;

    let rosterHtml = `
      <div class="section-title">Full Squad (${players.length} players)</div>
      <div class="roster-wrap"><table class="roster">${thead}<tbody>`;

    if (starters.length) {
      rosterHtml += `<tr><td colspan="9" class="sub-header">Lineup Last Match</td></tr>`;
      rosterHtml += starters.map(rosterRow).join('');
    }

    if (substitutes.length) {
      rosterHtml += `<tr><td colspan="9" class="sub-header">Subs Last Match</td></tr>`;
      rosterHtml += substitutes.map(rosterRow).join('');
    }

    if (unused.length) {
      rosterHtml += `<tr><td colspan="9" class="sub-header">Rest of Squad</td></tr>`;
      rosterHtml += unused.map(rosterRow).join('');
    }

    rosterHtml += '</tbody></table></div>';
    document.getElementById('roster-section').innerHTML = rosterHtml;

    loading.style.display = 'none';
    content.style.display = 'block';
  } catch(e) {
    loading.textContent = 'Error loading team: ' + e.message;
  }
}
</script>
</body>
</html>
