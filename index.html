<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Prediction League</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.lb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; }
.lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0 0 14px; overflow: hidden; position: relative; transition: transform .15s; }
.lb-card:hover { transform: translateY(-2px); }
.lb-card.rank-1 { border-color: var(--gold); }
.lb-card.rank-2 { border-color: var(--silver); }
.lb-card.rank-3 { border-color: var(--bronze); }
.lb-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; background: #071810; }
.lb-ribbon { position: absolute; top: 8px; left: 8px; font-family: 'Bebas Neue',sans-serif; font-size: 11px; letter-spacing: .1em; padding: 3px 8px; border-radius: 4px; }
.rank-1 .lb-ribbon { background: var(--gold); color: #003; }
.rank-2 .lb-ribbon { background: var(--silver); color: #111; }
.rank-3 .lb-ribbon { background: var(--bronze); color: #fff; }
.rank-4 .lb-ribbon, .rank-5 .lb-ribbon { background: rgba(255,255,255,.1); color: var(--dim); }
.lb-body { padding: 10px 12px 0; }
.lb-name { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
.lb-pts  { font-family: 'Bebas Neue',sans-serif; font-size: 40px; line-height: 1; margin-bottom: 8px; }
.rank-1 .lb-pts { color: var(--gold); }
.lb-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.lb-card.rank-1::after { content: '🏆'; position: absolute; top: 8px; right: 8px; font-size: 16px; opacity: .8; }

.games-list { display: flex; flex-direction: column; gap: 10px; }
.game-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.game-card.norway { border-left: 3px solid var(--norway); }
.game-hdr { display: grid; grid-template-columns: 28px 1fr auto 1fr auto; align-items: center; gap: 8px; padding: 12px 14px; cursor: pointer; user-select: none; }
.game-hdr:hover { background: rgba(255,255,255,.025); }
.g-num  { font-family: 'Bebas Neue',sans-serif; font-size: 16px; color: var(--dim); text-align: center; }
.g-team { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.g-team.home { text-align: right; }
.g-score { font-family: 'JetBrains Mono',monospace; font-size: 16px; min-width: 50px; text-align: center; padding: 3px 8px; border-radius: 5px; background: rgba(255,255,255,.05); }
.g-score.done { background: rgba(240,180,41,.12); color: var(--gold); }
.g-score.pending { color: var(--dim); font-size: 11px; }
.g-meta { font-size: 10px; color: var(--dim); text-align: right; line-height: 1.5; }
.lock-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: rgba(224,52,52,.15); color: #e07070; }
.open-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: rgba(96,185,122,.15); color: var(--green); }
.norway-badge { font-size: 9px; font-weight: 700; background: rgba(239,43,45,.15); color: #f47c7e; padding: 2px 5px; border-radius: 3px; margin-left: 3px; vertical-align: middle; }
.preds-panel { display: none; border-top: 1px solid var(--border); padding: 12px 14px; }
.preds-panel.open { display: block; }
.preds-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.pred-cell { flex: 1; min-width: 88px; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; }
.pred-name { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
.pred-score { font-family: 'JetBrains Mono',monospace; font-size: 14px; font-weight: 500; }
.pred-score.empty { color: var(--dim); font-size: 11px; font-family: 'Inter',sans-serif; }
.pred-inp-row { display: flex; gap: 8px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
.pred-inp-row label { font-size: 12px; color: var(--dim); white-space: nowrap; }
.pred-inp { width: 90px; font-family: 'JetBrains Mono',monospace; }
.save-msg { font-size: 11px; margin-left: 4px; opacity: 0; transition: opacity .3s; }
.save-msg.show { opacity: 1; }
.locked-msg { font-size: 11px; color: #e07070; font-style: italic; }
.toggle-arrow { font-size: 9px; color: var(--dim); transition: transform .2s; margin-left: 3px; }
.game-card.open .toggle-arrow { transform: rotate(180deg); }
.round-sep { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; color:var(--gold); padding:24px 0 8px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:10px; }
.game-card.knockout { border-left:3px solid rgba(240,180,41,0.3); }
.g-team-link { cursor:pointer; text-decoration:underline; text-decoration-color:rgba(255,255,255,0.15); text-underline-offset:3px; }
.g-team-link:hover { text-decoration-color:var(--gold); }
.team-popup-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.6); justify-content:center; align-items:center; }
.team-popup-overlay.open { display:flex; }
.team-popup { background:#0e2718; border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:16px; width:280px; max-width:90vw; box-shadow:0 12px 32px rgba(0,0,0,.6); }
.tp-hdr { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.tp-flag { font-size:28px; }
.tp-name { font-weight:700; font-size:15px; }
.tp-meta { font-size:11px; color:var(--dim); margin-top:2px; }
.tp-form { display:flex; gap:3px; margin-bottom:10px; }
.tp-dot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.tp-dot.w { background:rgba(96,185,122,.2); color:var(--green); }
.tp-dot.d { background:rgba(240,180,41,.15); color:var(--gold); }
.tp-dot.l { background:rgba(224,52,52,.15); color:#e07070; }
.tp-dot.u { background:rgba(255,255,255,.05); color:var(--dim); }
.tp-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; margin-bottom:10px; }
.tp-stat { background:#0e2718; text-align:center; padding:8px 4px; }
.tp-stat-val { font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600; }
.tp-stat-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }
.tp-matches { font-size:11px; color:var(--dim); line-height:1.8; }
.tp-match-res { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--text); }
.tp-close { display:block; margin-top:12px; width:100%; text-align:center; font-size:11px; color:var(--dim); cursor:pointer; border:none; background:rgba(255,255,255,.05); padding:6px; border-radius:6px; }
.tp-close:hover { background:rgba(255,255,255,.1); }
.matchup-bar { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.mu-side { background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px; padding:10px; }
.mu-hdr { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.mu-flag { font-size:18px; }
.mu-name { font-weight:700; font-size:12px; }
.mu-meta { font-size:9px; color:var(--dim); }
.mu-form { display:flex; gap:2px; margin-bottom:6px; }
.mu-dot { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; }
.mu-dot.w { background:rgba(96,185,122,.2); color:var(--green); }
.mu-dot.d { background:rgba(240,180,41,.15); color:var(--gold); }
.mu-dot.l { background:rgba(224,52,52,.15); color:#e07070; }
.mu-dot.u { background:rgba(255,255,255,.05); color:var(--dim); }
.mu-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(255,255,255,.06); border-radius:5px; overflow:hidden; margin-bottom:6px; }
.mu-stat { background:var(--card); text-align:center; padding:4px 2px; }
.mu-stat-val { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; }
.mu-stat-lbl { font-size:7px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
.mu-matches { font-size:9px; color:var(--dim); line-height:1.6; }
.mu-match-res { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--text); }
.mu-lineup { margin-top:6px; border-top:1px solid var(--border); padding-top:6px; }
.mu-lineup-hdr { font-size:8px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); margin-bottom:4px; }
.mu-formation { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--gold); font-size:9px; }
.mu-player { font-size:9px; color:var(--text); line-height:1.5; }
.mu-jersey { font-family:'JetBrains Mono',monospace; color:var(--dim); font-size:8px; display:inline-block; width:20px; text-align:right; margin-right:4px; }
.mu-pos { font-size:7px; color:var(--dim); }
.mu-more { display:inline-block; font-size:9px; color:var(--gold); text-decoration:none; margin-top:4px; }
.mu-more:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="tourn-label">FIFA World Cup 2026</div>
    <h1>Prediction <span>League</span></h1>
    <div class="subtitle">Eivind · Mari · Benny · Martin · TJ · Helle</div>
  </div>

  <section style="margin-bottom:40px">
    <div class="section-title">Standings</div>
    <div class="lb-grid" id="lb-grid"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
  </section>

  <section>
    <div class="section-title">Games</div>
    <div class="games-list" id="games-list"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
  </section>
</div>

<div class="team-popup-overlay" id="team-popup-overlay" onclick="if(event.target===this)closeTeamPopup()">
  <div class="team-popup" id="team-popup"></div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('index');
const rankLabel = ['🥇 1st','🥈 2nd','🥉 3rd','4th','5th','6th'];
const rankClass = ['rank-1','rank-2','rank-3','rank-4','rank-5','rank-6'];
const ROUND_LABELS = {group:'Group',R32:'Round of 32',R16:'Round of 16',QF:'Quarter-final',SF:'Semi-final','3rd':'3rd Place',F:'Final'};
let allGames = [], allPredictions = [], teamData = {}, scheduleData = [];

async function load() {
  const [games, preds, teams, sched] = await Promise.all([
    sb('games?select=*&order=id'),
    sb('predictions?select=*'),
    sb('teams?select=name,group_letter,confederation,last_formation,last_starting_xi&order=name'),
    sb('schedule?select=home_team,away_team,home_score,away_score,status,group_name&order=id'),
  ]);
  allGames = games;
  allPredictions = preds;
  scheduleData = sched;
  teams.forEach(t => teamData[t.name] = t);
  renderLB(); renderGames();
}

function renderLB() {
  const lb = buildLeaderboard(allGames, allPredictions);
  document.getElementById('lb-grid').innerHTML = lb.map(([name, s], i) => `
    <div class="lb-card ${rankClass[i]||''}">
      <div style="position:relative">
        <img class="lb-photo" src="${PLAYER_PHOTOS[name]}" alt="${name}" loading="lazy"
          onerror="this.src='${BASE_URL}/placeholder.jpg'">
        <span class="lb-ribbon">${rankLabel[i]||''}</span>
      </div>
      <div class="lb-body">
        <div class="lb-name">${name}</div>
        <div class="lb-pts">${s.pts}</div>
        <div class="lb-chips">
          ${s.exact  ? `<span class="chip chip-exact">${s.exact}× exact</span>`  : ''}
          ${s.winner ? `<span class="chip chip-win">${s.winner}× winner</span>`  : ''}
          ${s.bonus  ? `<span class="chip chip-win">${s.bonus}× ⚔ bonus</span>` : ''}
          ${s.wrong  ? `<span class="chip chip-wrong">${s.wrong}× miss</span>`   : ''}
          ${s.missed ? `<span class="chip chip-missed">${s.missed}× skipped</span>` : ''}
          <span class="chip chip-played">${s.played} played</span>
        </div>
      </div>
    </div>`).join('');
}

function badgeHtml(game, pred) {
  const st = predStatus(game, pred?.prediction || pred);
  if (st==='pending') return '';
  if (st==='missed')  return `<span class="badge badge-m">— missed</span>`;
  const pts = calcPts(game, pred);
  if (st==='exact')   return `<span class="badge badge-3">⚽ ${pts} pts</span>`;
  if (st==='winner')  return `<span class="badge badge-1">✓ ${pts} pt${pts!==1?'s':''}</span>`;
  return `<span class="badge badge-0">✗ 0 pts</span>`;
}

function renderGames() {
  const user = getUser();
  // Group games by round
  const roundOrder = ['group','R32','R16','QF','SF','3rd','F'];
  let currentRound = '';

  document.getElementById('games-list').innerHTML = allGames.map(g => {
    const ko = isKnockout(g);
    const groupsDone = allGames.filter(x => x.round === 'group').every(x => x.result);
    const teamsKnown = !ko || (groupsDone && g.home_slot !== g.home && g.away_slot !== g.away);
    const isSlot = ko && !teamsKnown;
    const locked = new Date() >= new Date(g.kickoff) || isSlot;
    const norway = [g.home,g.away].some(t => t.toLowerCase()==='norway' || t.toLowerCase()==='iraq');
    const kickoff = new Date(g.kickoff);
    const dateStr = kickoff.toLocaleDateString('no-NO',{day:'numeric',month:'short'});
    const timeStr = kickoff.toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'});
    const homeName = isSlot && g.home_slot ? g.home_slot : g.home;
    const awayName = isSlot && g.away_slot ? g.away_slot : g.away;
    const homeFlag = FLAG_MAP[homeName] ? FLAG_MAP[homeName]+' ' : '';
    const awayFlag = FLAG_MAP[awayName] ? FLAG_MAP[awayName]+' ' : '';
    const homeL = homeFlag + homeName + (homeName.toLowerCase()==='norway'?' <span class="norway-badge">🇳🇴</span>':'');
    const awayL = awayFlag + awayName + (awayName.toLowerCase()==='norway'?' <span class="norway-badge">🇳🇴</span>':'');

    const predsHtml = CONTENDERS.map(name => {
      const p = allPredictions.find(p => p.game_id===g.id && p.participant===name);
      let winnerBadge = '';
      if (ko && p?.prediction && isDraw(p.prediction) && p.winner) {
        winnerBadge = `<div style="font-size:9px;color:var(--dim);margin-top:2px">⚔ ${p.winner}</div>`;
      }
      return `<div class="pred-cell">
        <div class="pred-name">${name}</div>
        <div class="pred-score ${p?.prediction?'':'empty'}">${p?.prediction||'—'}</div>
        ${winnerBadge}
        ${g.result ? badgeHtml(g, p) : (p&&isValidScore(p.prediction)?'<span class="badge badge-t">Tipped ✓</span>':'')}
      </div>`;
    }).join('');

    let inputHtml = '';
    if (user && !isSlot) {
      const myP = allPredictions.find(p => p.game_id===g.id && p.participant===user);
      if (locked) {
        inputHtml = `<div class="pred-inp-row"><span class="locked-msg">🔒 Locked — game has started</span></div>`;
      } else {
        const myVal = myP?.prediction || '';
        const showWinner = ko && isDraw(myVal);
        inputHtml = `<div class="pred-inp-row">
            <label>Your tip:</label>
            <input class="inp pred-inp" id="inp-${g.id}" placeholder="e.g. 2-1" maxlength="6" value="${myVal}" oninput="toggleWinnerPick(${g.id})">
            <button class="btn btn-gold" style="padding:7px 14px;font-size:12px" onclick="savePred(${g.id})">Save</button>
            <span class="save-msg" id="msg-${g.id}" style="color:var(--green)">Saved ✓</span>
          </div>
          ${ko ? `<div class="pred-inp-row" id="winner-row-${g.id}" style="display:${showWinner?'flex':'none'}">
            <label>Who advances?</label>
            <select class="inp" id="winner-${g.id}" style="font-size:12px;padding:6px 8px">
              <option value="">Pick…</option>
              <option value="${g.home}"${myP?.winner===g.home?' selected':''}>${homeFlag}${g.home}</option>
              <option value="${g.away}"${myP?.winner===g.away?' selected':''}>${awayFlag}${g.away}</option>
            </select>
          </div>` : ''}`;
      }
    } else if (isSlot) {
      const slotMsg = !groupsDone ? 'Opens when group stage is finished' : 'Opens when matchup is determined';
      inputHtml = `<div class="pred-inp-row"><span class="locked-msg" style="color:var(--dim)">⏳ ${slotMsg}</span></div>`;
    }

    // Round separator
    let separator = '';
    if (g.round !== currentRound) {
      currentRound = g.round;
      separator = `<div class="round-sep">${ROUND_LABELS[g.round] || g.round}</div>`;
    }

    return `${separator}<div class="game-card${norway?' norway':''}${ko?' knockout':''}" id="gc-${g.id}">
      <div class="game-hdr" onclick="toggleGame(${g.id})">
        <div class="g-num">${g.id}</div>
        <div class="g-team home">${teamData[normTeam(homeName)] ? `<span class="g-team-link" onclick="showTeamPopup('${homeName.replace(/'/g,"\\'")}',event)">${homeL}</span>` : homeL}</div>
        <div class="g-score ${g.result?'done':'pending'}">${g.result||'vs'}</div>
        <div class="g-team">${teamData[normTeam(awayName)] ? `<span class="g-team-link" onclick="showTeamPopup('${awayName.replace(/'/g,"\\'")}',event)">${awayL}</span>` : awayL}</div>
        <div class="g-meta">${dateStr} ${timeStr}<br>${locked?'<span class="lock-pill">LOCKED</span>':'<span class="open-pill">OPEN</span>'} <span class="toggle-arrow">▼</span></div>
      </div>
      <div class="preds-panel" id="pp-${g.id}">
        ${!isSlot ? matchupHtml(homeName, awayName) : ''}
        <div class="preds-grid">${predsHtml}</div>
        ${inputHtml}
      </div>
    </div>`;
  }).join('');
}

// ── Team helpers ──────────────────────────────────────────────────────────────
const TEAM_ALIAS = {'Korea Republic':'South Korea','Bosnia and Herzegovina':'Bosnia & Herz.','Bosnia-Herzegovina':'Bosnia & Herz.','Ivory Coast':"Côte d'Ivoire",'Iran':'IR Iran','Cape Verde':'Cabo Verde','Democratic Republic of the Congo':'DR Congo','Congo DR':'DR Congo','United States':'USA','Turkey':'Türkiye','Czech Republic':'Czechia'};
function normTeam(n) { return TEAM_ALIAS[n]||n; }

function teamSideHtml(name) {
  const canonical = normTeam(name);
  const t = teamData[canonical];
  if (!t) return `<div class="mu-side"><div class="mu-hdr"><span class="mu-name">${name}</span></div><div class="mu-meta">No data yet</div></div>`;
  const flag = FLAG_MAP[canonical]||FLAG_MAP[name]||'';

  const matches = scheduleData.filter(m => m.status==='FT' && (normTeam(m.home_team)===canonical || normTeam(m.away_team)===canonical));
  let gf=0, ga=0;
  const recent = [];
  matches.forEach(m => {
    const isHome = normTeam(m.home_team)===canonical;
    const hs=m.home_score, as=m.away_score;
    const mGf=isHome?hs:as, mGa=isHome?as:hs;
    gf+=mGf; ga+=mGa;
    const opp = isHome ? normTeam(m.away_team) : normTeam(m.home_team);
    const oppFlag = FLAG_MAP[opp]||'';
    let res; if (mGf>mGa) res='W'; else if (mGf<mGa) res='L'; else res='D';
    recent.push({opp,oppFlag,gf:mGf,ga:mGa,res,isHome});
  });

  const form = recent.slice(-5);
  const formHtml = Array(5).fill(null).map((_,i) => {
    const r = form[i]?.res || 'U';
    return `<div class="mu-dot ${r.toLowerCase()}">${r}</div>`;
  }).join('');

  const matchesHtml = recent.slice(-3).map(m =>
    `<div>${m.isHome?'vs':'@'} ${m.oppFlag} ${m.opp} <span class="mu-match-res">${m.gf}-${m.ga}</span></div>`
  ).join('');

  return `<div class="mu-side">
    <div class="mu-hdr"><span class="mu-flag">${flag}</span><div><div class="mu-name">${canonical}</div><div class="mu-meta">Group ${t.group_letter} · ${t.confederation||''}</div></div></div>
    <div class="mu-form">${formHtml}</div>
    <div class="mu-stats">
      <div class="mu-stat"><div class="mu-stat-val">${matches.length}</div><div class="mu-stat-lbl">Played</div></div>
      <div class="mu-stat"><div class="mu-stat-val">${gf}</div><div class="mu-stat-lbl">GF</div></div>
      <div class="mu-stat"><div class="mu-stat-val" style="color:${ga>0?'#e07070':'var(--dim)'}">${ga}</div><div class="mu-stat-lbl">GA</div></div>
    </div>
    ${matchesHtml ? `<div class="mu-matches">${matchesHtml}</div>` : ''}
    ${t.last_formation ? `<div class="mu-lineup"><div class="mu-lineup-hdr">Last lineup <span class="mu-formation">${t.last_formation}</span></div>${(t.last_starting_xi||[]).map(p => `<div class="mu-player"><span class="mu-jersey">${p.number}</span>${p.short||p.name} <span class="mu-pos">${p.position}</span></div>`).join('')}</div>` : ''}
    <a class="mu-more" href="team.html?team=${encodeURIComponent(canonical)}" onclick="event.stopPropagation()">View full squad &rarr;</a>
  </div>`;
}

function matchupHtml(homeName, awayName) {
  const hCanon = normTeam(homeName), aCanon = normTeam(awayName);
  if (!teamData[hCanon] && !teamData[aCanon]) return '';
  return `<div class="matchup-bar">${teamSideHtml(homeName)}${teamSideHtml(awayName)}</div>`;
}

function showTeamPopup(name, ev) {
  ev.stopPropagation();
  const canonical = normTeam(name);
  const t = teamData[canonical];
  if (!t) return;
  const flag = FLAG_MAP[canonical]||FLAG_MAP[name]||'';

  const matches = scheduleData.filter(m => {
    if (m.status !== 'FT') return false;
    return normTeam(m.home_team)===canonical || normTeam(m.away_team)===canonical;
  });
  let gf=0, ga=0;
  const recent = [];
  matches.forEach(m => {
    const isHome = normTeam(m.home_team)===canonical;
    const hs=m.home_score, as=m.away_score;
    const mGf=isHome?hs:as, mGa=isHome?as:hs;
    gf+=mGf; ga+=mGa;
    const opp = isHome ? normTeam(m.away_team) : normTeam(m.home_team);
    const oppFlag = FLAG_MAP[opp]||'';
    let res;
    if (mGf>mGa) res='W'; else if (mGf<mGa) res='L'; else res='D';
    recent.push({opp,oppFlag,gf:mGf,ga:mGa,res,isHome});
  });

  const form = recent.slice(-5);
  const formHtml = Array(5).fill(null).map((_,i) => {
    const r = form[i]?.res || 'U';
    return `<div class="tp-dot ${r.toLowerCase()}">${r}</div>`;
  }).join('');

  const matchesHtml = recent.map(m =>
    `<div>${m.isHome?'vs':'@'} ${m.oppFlag} ${m.opp} <span class="tp-match-res">${m.gf}-${m.ga}</span></div>`
  ).join('');

  document.getElementById('team-popup').innerHTML = `
    <div class="tp-hdr">
      <div class="tp-flag">${flag}</div>
      <div><div class="tp-name">${canonical}</div><div class="tp-meta">Group ${t.group_letter} · ${t.confederation||''}</div></div>
    </div>
    <div class="tp-form">${formHtml}</div>
    <div class="tp-stats">
      <div class="tp-stat"><div class="tp-stat-val">${matches.length}</div><div class="tp-stat-lbl">Played</div></div>
      <div class="tp-stat"><div class="tp-stat-val">${gf}</div><div class="tp-stat-lbl">GF</div></div>
      <div class="tp-stat"><div class="tp-stat-val" style="color:${ga>0?'#e07070':'var(--dim)'}">${ga}</div><div class="tp-stat-lbl">GA</div></div>
    </div>
    ${matchesHtml ? `<div class="tp-matches">${matchesHtml}</div>` : ''}
    <button class="tp-close" onclick="closeTeamPopup()">Close</button>`;
  document.getElementById('team-popup-overlay').classList.add('open');
}

function closeTeamPopup() {
  document.getElementById('team-popup-overlay').classList.remove('open');
}

function toggleWinnerPick(gameId) {
  const inp = document.getElementById(`inp-${gameId}`);
  const row = document.getElementById(`winner-row-${gameId}`);
  if (!row) return;
  const val = inp.value.trim();
  row.style.display = isDraw(val) ? 'flex' : 'none';
}

function toggleGame(id) {
  document.getElementById(`pp-${id}`)?.classList.toggle('open');
  document.getElementById(`gc-${id}`)?.classList.toggle('open');
}

async function savePred(gameId) {
  const inp = document.getElementById(`inp-${gameId}`);
  const msg = document.getElementById(`msg-${gameId}`);
  const pred = inp.value.trim();
  const user = getUser();
  if (!pred || !user) return;

  const game = allGames.find(g => g.id === gameId);
  const winnerEl = document.getElementById(`winner-${gameId}`);
  const winner = (isKnockout(game) && isDraw(pred) && winnerEl) ? winnerEl.value || null : null;

  inp.disabled = true;
  try {
    const payload = { prediction: pred, winner };
    const existing = allPredictions.find(p => p.game_id===gameId && p.participant===user);
    if (existing) {
      await sb(`predictions?game_id=eq.${gameId}&participant=eq.${encodeURIComponent(user)}`, { method:'PATCH', body: JSON.stringify(payload) });
      existing.prediction = pred;
      existing.winner = winner;
    } else {
      await sb('predictions', { method:'POST', body: JSON.stringify({game_id:gameId, participant:user, ...payload}) });
      allPredictions.push({game_id:gameId, participant:user, prediction:pred, winner});
    }
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
    renderLB(); renderGames();
    setTimeout(() => { document.getElementById(`pp-${gameId}`)?.classList.add('open'); document.getElementById(`gc-${gameId}`)?.classList.add('open'); }, 50);
  } catch(e) {
    msg.textContent = 'Error'; msg.style.color='var(--red)'; msg.classList.add('show');
  } finally { inp.disabled = false; }
}

load();
</script>
