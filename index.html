<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Prediction League</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.lb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; }
.lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0 0 14px; overflow: hidden; position: relative; transition: transform .15s; }
.lb-card:hover { transform: translateY(-2px); }
.lb-card.rank-1 { border-color: var(--gold); }
.lb-card.rank-2 { border-color: var(--silver); }
.lb-card.rank-3 { border-color: var(--bronze); }
.lb-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; background: #071810; }
.lb-ribbon { position: absolute; top: 8px; left: 8px; font-family: 'Bebas Neue',sans-serif; font-size: 11px; letter-spacing: .1em; padding: 3px 8px; border-radius: 4px; }
.rank-1 .lb-ribbon { background: var(--gold); color: #003; }
.rank-2 .lb-ribbon { background: var(--silver); color: #111; }
.rank-3 .lb-ribbon { background: var(--bronze); color: #fff; }
.rank-4 .lb-ribbon, .rank-5 .lb-ribbon { background: rgba(255,255,255,.1); color: var(--dim); }
.lb-body { padding: 10px 12px 0; }
.lb-name { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
.lb-pts  { font-family: 'Bebas Neue',sans-serif; font-size: 40px; line-height: 1; margin-bottom: 8px; }
.rank-1 .lb-pts { color: var(--gold); }
.lb-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.lb-card.rank-1::after { content: '🏆'; position: absolute; top: 8px; right: 8px; font-size: 16px; opacity: .8; }

.games-list { display: flex; flex-direction: column; gap: 10px; }
.game-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; border-left: 3px solid rgba(240,180,41,.35); }
.game-card.norway { border-left: 3px solid var(--norway); }
.game-hdr { display: grid; grid-template-columns: 28px 1fr auto 1fr auto; align-items: center; gap: 8px; padding: 12px 14px; cursor: pointer; user-select: none; }
.game-hdr:hover { background: rgba(255,255,255,.025); }
.g-num  { font-family: 'Bebas Neue',sans-serif; font-size: 16px; color: var(--dim); text-align: center; }
.g-team { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.g-team.home { text-align: right; }
.g-score { font-family: 'JetBrains Mono',monospace; font-size: 16px; min-width: 50px; text-align: center; padding: 3px 8px; border-radius: 5px; background: rgba(255,255,255,.05); }
.g-score.done { background: rgba(240,180,41,.12); color: var(--gold); }
.g-score.pending { color: var(--dim); font-size: 11px; }
.g-meta { font-size: 10px; color: var(--dim); text-align: right; line-height: 1.5; }
.lock-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: rgba(224,52,52,.15); color: #e07070; }
.open-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: rgba(96,185,122,.15); color: var(--green); }
.norway-badge { font-size: 9px; font-weight: 700; background: rgba(239,43,45,.15); color: #f47c7e; padding: 2px 5px; border-radius: 3px; margin-left: 3px; vertical-align: middle; }
.preds-panel { display: none; border-top: 1px solid var(--border); padding: 12px 14px; }
.preds-panel.open { display: block; }
.preds-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.pred-cell { flex: 1; min-width: 88px; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; }
.pred-name { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
.pred-score { font-family: 'JetBrains Mono',monospace; font-size: 14px; font-weight: 500; }
.pred-score.empty { color: var(--dim); font-size: 11px; font-family: 'Inter',sans-serif; }
.pred-inp-row { display: flex; gap: 8px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
.pred-inp-row label { font-size: 12px; color: var(--dim); white-space: nowrap; }
.pred-inp { width: 90px; font-family: 'JetBrains Mono',monospace; }
.save-msg { font-size: 11px; margin-left: 4px; opacity: 0; transition: opacity .3s; }
.save-msg.show { opacity: 1; }
.locked-msg { font-size: 11px; color: #e07070; font-style: italic; }
.toggle-arrow { font-size: 9px; color: var(--dim); transition: transform .2s; margin-left: 3px; }
.game-card.open .toggle-arrow { transform: rotate(180deg); }
.round-sep { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; color:var(--gold); padding:24px 0 8px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:10px; }
.game-card.knockout { border-left:3px solid rgba(240,180,41,0.3); }

/* Date nav */
.date-nav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
.date-btn {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  color:var(--dim); font-size:11px; font-weight:600; padding:6px 10px;
  cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s;
  text-align:center; line-height:1.3;
}
.date-btn:hover { border-color:var(--gold); color:var(--white); }
.date-btn.active { background:rgba(240,180,41,.12); border-color:var(--gold); color:var(--gold); }
.date-btn .dow { display:block; font-size:9px; letter-spacing:.06em; text-transform:uppercase; opacity:.7; }
.date-btn .day { display:block; font-family:'Bebas Neue',sans-serif; font-size:18px; line-height:1; }
.day-title {
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.06em;
  color:var(--gold); margin-bottom:10px; margin-top:24px; display:flex; align-items:center; gap:10px;
}
.day-title::after { content:''; flex:1; height:1px; background:var(--border); }
/* Simple schedule card (non-prediction) */
.sched-card {
  background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; opacity:.6;
}
.sched-card.norway { border-left:3px solid var(--norway); }
.sched-row {
  display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
  gap:10px; padding:10px 14px;
}
.s-team { display:flex; align-items:center; gap:6px; font-weight:600; font-size:12px; }
.s-team.home { justify-content:flex-end; text-align:right; }
.s-flag { font-size:18px; line-height:1; }
.s-score {
  font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700;
  min-width:50px; text-align:center; padding:3px 8px; border-radius:5px;
  background:rgba(255,255,255,.04);
}
.s-score.ft { background:rgba(240,180,41,.1); color:var(--gold); }
.s-score.sched { color:var(--dim); font-size:11px; font-weight:500; font-family:'Inter',sans-serif; }
.sched-meta {
  display:flex; justify-content:space-between; align-items:center;
  padding:0 14px 8px; font-size:9px; color:var(--dim);
}
.s-group { font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
.g-team-link { cursor:pointer; text-decoration:underline; text-decoration-color:rgba(255,255,255,0.15); text-underline-offset:3px; }
.g-team-link:hover { text-decoration-color:var(--gold); }
.team-popup-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.6); justify-content:center; align-items:center; }
.team-popup-overlay.open { display:flex; }
.team-popup { background:#0e2718; border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:16px; width:280px; max-width:90vw; box-shadow:0 12px 32px rgba(0,0,0,.6); }
.tp-hdr { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.tp-flag { font-size:28px; }
.tp-name { font-weight:700; font-size:15px; }
.tp-meta { font-size:11px; color:var(--dim); margin-top:2px; }
.tp-form { display:flex; gap:3px; margin-bottom:10px; }
.tp-dot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.tp-dot.w { background:rgba(96,185,122,.2); color:var(--green); }
.tp-dot.d { background:rgba(240,180,41,.15); color:var(--gold); }
.tp-dot.l { background:rgba(224,52,52,.15); color:#e07070; }
.tp-dot.u { background:rgba(255,255,255,.05); color:var(--dim); }
.tp-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; margin-bottom:10px; }
.tp-stat { background:#0e2718; text-align:center; padding:8px 4px; }
.tp-stat-val { font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600; }
.tp-stat-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }
.tp-matches { font-size:11px; color:var(--dim); line-height:1.8; }
.tp-match-res { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--text); }
.tp-close { display:block; margin-top:12px; width:100%; text-align:center; font-size:11px; color:var(--dim); cursor:pointer; border:none; background:rgba(255,255,255,.05); padding:6px; border-radius:6px; }
.tp-close:hover { background:rgba(255,255,255,.1); }
.matchup-bar { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.mu-side { background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px; padding:10px; }
.mu-hdr { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.mu-flag { font-size:18px; }
.mu-name { font-weight:700; font-size:12px; }
.mu-meta { font-size:9px; color:var(--dim); }
.mu-form { display:flex; gap:2px; margin-bottom:6px; }
.mu-dot { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; }
.mu-dot.w { background:rgba(96,185,122,.2); color:var(--green); }
.mu-dot.d { background:rgba(240,180,41,.15); color:var(--gold); }
.mu-dot.l { background:rgba(224,52,52,.15); color:#e07070; }
.mu-dot.u { background:rgba(255,255,255,.05); color:var(--dim); }
.mu-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(255,255,255,.06); border-radius:5px; overflow:hidden; margin-bottom:6px; }
.mu-stat { background:var(--card); text-align:center; padding:4px 2px; }
.mu-stat-val { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; }
.mu-stat-lbl { font-size:7px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
.mu-matches { font-size:9px; color:var(--dim); line-height:1.6; }
.mu-match-res { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--text); }
.mu-lineup { margin-top:6px; border-top:1px solid var(--border); padding-top:6px; }
.mu-lineup-hdr { font-size:8px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); margin-bottom:4px; }
.mu-formation { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--gold); font-size:9px; }
.mu-player { font-size:9px; color:var(--text); line-height:1.5; }
.mu-jersey { font-family:'JetBrains Mono',monospace; color:var(--dim); font-size:8px; display:inline-block; width:20px; text-align:right; margin-right:4px; }
.mu-pos { font-size:7px; color:var(--dim); }
.mu-more { display:inline-block; font-size:9px; color:var(--gold); text-decoration:none; margin-top:4px; }
.mu-more:hover { text-decoration:underline; }

/* Schedule card expansion */
.sched-card { cursor:pointer; transition:transform .15s; }
.sched-card:hover { transform:translateY(-1px); }
.sched-card.has-detail { opacity:1; }
.sched-detail { display:none; border-top:1px solid var(--border); padding:14px; }
.sched-detail.open { display:block; }
/* Two-column timeline */
.md-timeline { padding:10px 0; }
.md-ev { display:grid; grid-template-columns:1fr 36px 1fr; align-items:center; min-height:26px; }
.md-ev-home { text-align:right; padding-right:10px; font-size:12px; line-height:1.4; }
.md-ev-away { text-align:left; padding-left:10px; font-size:12px; line-height:1.4; }
.md-ev-min {
  text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim);
  position:relative; padding:4px 0;
}
.md-ev-min::before {
  content:''; position:absolute; left:50%; top:0; bottom:0; width:2px;
  background:var(--border); transform:translateX(-50%); z-index:0;
}
.md-ev:first-child .md-ev-min::before { top:50%; }
.md-ev:last-child .md-ev-min::before { bottom:50%; }
.md-ev:only-child .md-ev-min::before { display:none; }
.md-ev-min span { position:relative; z-index:1; background:var(--card); padding:1px 3px; border-radius:3px; }
.md-ev-name { font-weight:600; }
.md-ev-assist { font-size:10px; color:var(--dim); }
.md-ev-sub-in { color:var(--green); }
.md-ev-sub-out { color:#e07070; }
.md-loading { text-align:center; color:var(--dim); font-size:12px; padding:20px; }
/* Lineup event badges (in matchup bar) */
.mu-ev { font-size:10px; margin-left:2px; display:inline; }
.mu-sub-out { color:#e07070; font-size:9px; }
.mu-sub-in { color:var(--green); font-size:9px; }
.mu-subs-hdr { font-size:8px; color:var(--dim); margin-top:6px; margin-bottom:2px; text-transform:uppercase; letter-spacing:.05em; }
.g-venue { font-size:9px; color:var(--dim); opacity:.7; }
/* Match stats comparison bars */
.md-stats { padding:12px 0; }
.md-stats-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin-bottom:8px; text-align:center; }
.md-stat-row { display:grid; grid-template-columns:36px 1fr auto 1fr 36px; align-items:center; gap:4px; margin-bottom:6px; font-size:11px; }
.md-stat-val { font-family:'JetBrains Mono',monospace; font-weight:600; font-size:11px; }
.md-stat-val.home { text-align:right; }
.md-stat-val.away { text-align:left; }
.md-stat-lbl { text-align:center; font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
.md-stat-bar { height:5px; border-radius:3px; background:rgba(255,255,255,.06); overflow:hidden; position:relative; }
.md-stat-bar.home { direction:rtl; }
.md-stat-fill { height:100%; border-radius:3px; transition:width .4s; }
.md-stat-bar.home .md-stat-fill { background:var(--gold); }
.md-stat-bar.away .md-stat-fill { background:rgba(96,185,122,.6); }
.md-stat-fill.winner { opacity:1; }
.md-stat-fill.loser { opacity:.35; }
.md-formations { display:flex; justify-content:space-between; font-size:11px; color:var(--dim); margin-bottom:8px; }
.md-formations span { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--text); }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="tourn-label">FIFA World Cup 2026</div>
    <h1>Prediction <span>League</span></h1>
    <div class="subtitle" id="subtitle">Loading...</div>
  </div>

  <section style="margin-bottom:40px">
    <div class="section-title">Standings</div>
    <div class="lb-grid" id="lb-grid"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
  </section>

  <section>
    <div class="section-title">Games</div>
    <div class="date-nav" id="date-nav"></div>
    <div class="games-list" id="games-list"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
  </section>
</div>

<div class="team-popup-overlay" id="team-popup-overlay" onclick="if(event.target===this)closeTeamPopup()">
  <div class="team-popup" id="team-popup"></div>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('index');
const rankLabel = ['🥇 1st','🥈 2nd','🥉 3rd','4th','5th','6th','7th'];
const rankClass = ['rank-1','rank-2','rank-3','rank-4','rank-5','rank-6','rank-7'];
const ROUND_LABELS = {group:'Group',R32:'Round of 32',R16:'Round of 16',QF:'Quarter-final',SF:'Semi-final','3rd':'3rd Place',F:'Final'};
let allGames = [], allPredictions = [], teamData = {}, scheduleData = [], playerPhotos = {};

const TEAM_ALIAS = {'Korea Republic':'South Korea','Bosnia and Herzegovina':'Bosnia & Herz.','Bosnia-Herzegovina':'Bosnia & Herz.','Ivory Coast':"Côte d'Ivoire",'Iran':'IR Iran','Cape Verde':'Cabo Verde','Democratic Republic of the Congo':'DR Congo','Congo DR':'DR Congo','United States':'USA','Turkey':'Türkiye','Czech Republic':'Czechia'};
function normTeam(n) { return TEAM_ALIAS[n]||n; }

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) { const dt = new Date(d+'T00:00:00'); return `${DOW[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`; }
function fmtTime(t) { if (!t) return ''; const [h,m] = t.split(':'); return `${h}:${m}`; }
function flagFor(team) { return FLAG_MAP[team] || FLAG_MAP[TEAM_ALIAS[team]] || ''; }
function scrollToDate(date) { const el = document.getElementById('day-'+date); if (el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

async function load() {
  const [games, preds, teams, sched, participants] = await Promise.all([
    sb('games?select=*&order=id'),
    sb('predictions?select=*'),
    sb('teams?select=name,group_letter,confederation,last_formation,last_starting_xi&order=name'),
    sb('schedule?select=*&order=match_date,kickoff_time,id'),
    sb('participants?select=name,photo_url'),
  ]);
  allGames = games;
  allPredictions = preds;
  scheduleData = sched;
  teams.forEach(t => teamData[t.name] = t);
  participants.forEach(p => playerPhotos[p.name] = p.photo_url);
  document.getElementById('subtitle').textContent = CONTENDERS.join(' · ');
  renderLB(); renderGames();
}

function renderLB() {
  const lb = buildLeaderboard(allGames, allPredictions);
  document.getElementById('lb-grid').innerHTML = lb.map(([name, s], i) => `
    <div class="lb-card ${rankClass[i]||''}">
      <div style="position:relative">
        <img class="lb-photo" src="${playerPhotos[name] || BASE_URL+'/placeholder.jpg'}" alt="${name}" loading="lazy"
          onerror="this.src='${BASE_URL}/placeholder.jpg'">
        <span class="lb-ribbon">${rankLabel[i]||''}</span>
      </div>
      <div class="lb-body">
        <div class="lb-name">${name}</div>
        <div class="lb-pts">${s.pts}</div>
        <div class="lb-chips">
          ${s.exact  ? `<span class="chip chip-exact">${s.exact}× exact</span>`  : ''}
          ${s.winner ? `<span class="chip chip-win">${s.winner}× winner</span>`  : ''}
          ${s.bonus  ? `<span class="chip chip-win">${s.bonus}× ⚔ bonus</span>` : ''}
          ${s.wrong  ? `<span class="chip chip-wrong">${s.wrong}× miss</span>`   : ''}
          ${s.missed ? `<span class="chip chip-missed">${s.missed}× skipped</span>` : ''}
          <span class="chip chip-played">${s.played} played</span>
        </div>
      </div>
    </div>`).join('');
}

function badgeHtml(game, pred) {
  const st = predStatus(game, pred?.prediction || pred);
  if (st==='pending') return '';
  if (st==='missed')  return `<span class="badge badge-m">— missed</span>`;
  const pts = calcPts(game, pred);
  if (st==='exact')   return `<span class="badge badge-3">⚽ ${pts} pts</span>`;
  if (st==='winner')  return `<span class="badge badge-1">✓ ${pts} pt${pts!==1?'s':''}</span>`;
  return `<span class="badge badge-0">✗ 0 pts</span>`;
}

// Build a lookup: "normHome|normAway" -> game object (for matching schedule to prediction games)
function buildGameLookup() {
  const lookup = {};
  allGames.forEach(g => {
    const h = normTeam(g.home), a = normTeam(g.away);
    lookup[`${h}|${a}`] = g;
    lookup[`${a}|${h}`] = g;
  });
  return lookup;
}

// Build lookup: "normHome|normAway" -> schedule.id
function buildSchedIdLookup() {
  const lookup = {};
  scheduleData.forEach(m => {
    const h = normTeam(m.home_team), a = normTeam(m.away_team);
    lookup[`${h}|${a}`] = m.id;
    lookup[`${a}|${h}`] = m.id;
  });
  return lookup;
}
let schedIdLookup = {};

function renderPredGame(g) {
  const user = getUser();
  const ko = isKnockout(g);
  // Teams are known if home/away have actual team names (not slot labels)
  // A slot label looks like "1st A", "2nd B", "3rd C/E" - check if home differs from home_slot
  const homeKnown = !ko || !g.home_slot || g.home !== g.home_slot;
  const awayKnown = !ko || !g.away_slot || g.away !== g.away_slot;
  const teamsKnown = homeKnown && awayKnown;
  const isSlot = ko && !teamsKnown;
  const locked = new Date() >= new Date(g.kickoff) || isSlot;
  const norway = [g.home,g.away].some(t => t.toLowerCase()==='norway' || t.toLowerCase()==='iraq');
  const kickoff = new Date(g.kickoff);
  const timeStr = kickoff.toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'});
  const homeName = isSlot && g.home_slot ? g.home_slot : g.home;
  const awayName = isSlot && g.away_slot ? g.away_slot : g.away;
  const homeFlag = FLAG_MAP[homeName] ? FLAG_MAP[homeName]+' ' : '';
  const awayFlag = FLAG_MAP[awayName] ? FLAG_MAP[awayName]+' ' : '';
  const homeL = homeFlag + homeName + (homeName.toLowerCase()==='norway'?' <span class="norway-badge">🇳🇴</span>':'');
  const awayL = awayFlag + awayName + (awayName.toLowerCase()==='norway'?' <span class="norway-badge">🇳🇴</span>':'');

  const predsHtml = CONTENDERS.map(name => {
    const p = allPredictions.find(p => p.game_id===g.id && p.participant===name);
    let winnerBadge = '';
    if (ko && p?.prediction && isDraw(p.prediction) && p.winner) {
      winnerBadge = `<div style="font-size:9px;color:var(--dim);margin-top:2px">⚔ ${p.winner}</div>`;
    }
    return `<div class="pred-cell">
      <div class="pred-name">${name}</div>
      <div class="pred-score ${p?.prediction?'':'empty'}">${p?.prediction||'—'}</div>
      ${winnerBadge}
      ${g.result ? badgeHtml(g, p) : (p&&isValidScore(p.prediction)?'<span class="badge badge-t">Tipped ✓</span>':'')}
    </div>`;
  }).join('');

  let inputHtml = '';
  if (user && !isSlot) {
    const myP = allPredictions.find(p => p.game_id===g.id && p.participant===user);
    if (locked) {
      inputHtml = `<div class="pred-inp-row"><span class="locked-msg">🔒 Locked — game has started</span></div>`;
    } else {
      const myVal = myP?.prediction || '';
      const showWinner = ko && isDraw(myVal);
      inputHtml = `<div class="pred-inp-row">
          <label>Your tip:</label>
          <input class="inp pred-inp" id="inp-${g.id}" placeholder="e.g. 2-1" maxlength="6" value="${myVal}" oninput="toggleWinnerPick(${g.id})">
          <button class="btn btn-gold" style="padding:7px 14px;font-size:12px" onclick="savePred(${g.id})">Save</button>
          <span class="save-msg" id="msg-${g.id}" style="color:var(--green)">Saved ✓</span>
        </div>
        ${ko ? `<div class="pred-inp-row" id="winner-row-${g.id}" style="display:${showWinner?'flex':'none'}">
          <label>Who advances?</label>
          <select class="inp" id="winner-${g.id}" style="font-size:12px;padding:6px 8px">
            <option value="">Pick…</option>
            <option value="${g.home}"${myP?.winner===g.home?' selected':''}>${homeFlag}${g.home}</option>
            <option value="${g.away}"${myP?.winner===g.away?' selected':''}>${awayFlag}${g.away}</option>
          </select>
        </div>` : ''}`;
    }
  } else if (isSlot) {
    const slotMsg = !groupsDone ? 'Opens when group stage is finished' : 'Opens when matchup is determined';
    inputHtml = `<div class="pred-inp-row"><span class="locked-msg" style="color:var(--dim)">⏳ ${slotMsg}</span></div>`;
  }

  const roundLabel = g.round && g.round !== 'group' ? `<span style="font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;margin-left:4px">${ROUND_LABELS[g.round]||g.round}</span>` : '';
  const sid = schedIdLookup[`${normTeam(g.home)}|${normTeam(g.away)}`];
  const schedMatch = sid ? scheduleData.find(s => s.id === sid) : null;
  const venueInfo = schedMatch && schedMatch.stadium ? `${schedMatch.group_name ? schedMatch.group_name + ' · ' : ''}${schedMatch.stadium}, ${schedMatch.city}` : '';

  return `<div class="game-card${norway?' norway':''}${ko?' knockout':''}" id="gc-${g.id}">
    <div class="game-hdr" onclick="toggleGame(${g.id})">
      <div class="g-num">${g.id}</div>
      <div class="g-team home">${teamData[normTeam(homeName)] ? `<span class="g-team-link" onclick="showTeamPopup('${homeName.replace(/'/g,"\\'")}',event)">${homeL}</span>` : homeL}</div>
      <div class="g-score ${g.result?'done':'pending'}">${g.result||timeStr}</div>
      <div class="g-team">${teamData[normTeam(awayName)] ? `<span class="g-team-link" onclick="showTeamPopup('${awayName.replace(/'/g,"\\'")}',event)">${awayL}</span>` : awayL}</div>
      <div class="g-meta">${roundLabel}${locked?'<span class="lock-pill">LOCKED</span>':'<span class="open-pill">OPEN</span>'} <span class="toggle-arrow">▼</span></div>
    </div>
    ${venueInfo ? `<div style="padding:0 14px 6px;margin-top:-6px"><span class="g-venue">${venueInfo}</span></div>` : ''}
    <div class="preds-panel" id="pp-${g.id}">
      <div id="mu-${g.id}">${!isSlot ? matchupHtml(homeName, awayName) : ''}</div>
      ${g.result && sid ? `<div id="md-${sid}" class="md-loading" style="padding:10px 0">Loading match events…</div>` : ''}
      <div class="preds-grid">${predsHtml}</div>
      ${inputHtml}
    </div>
  </div>`;
}

function renderSchedCard(m) {
  const nor = m.home_team === 'Norway' || m.away_team === 'Norway';
  const isFt = m.status === 'FT';
  const scoreText = isFt ? `${m.home_score} - ${m.away_score}` : (m.kickoff_time ? fmtTime(m.kickoff_time) : 'TBD');
  return `<div class="sched-card${nor ? ' norway' : ''}${isFt ? ' has-detail' : ''}" id="sc-${m.id}" onclick="toggleSchedDetail(${m.id})">
    <div class="sched-row">
      <div class="s-team home"><span>${m.home_team}</span> <span class="s-flag">${flagFor(m.home_team)}</span></div>
      <div class="s-score ${isFt ? 'ft' : 'sched'}">${scoreText}</div>
      <div class="s-team"><span class="s-flag">${flagFor(m.away_team)}</span> <span>${m.away_team}</span></div>
    </div>
    <div class="sched-meta"><span class="s-group">${m.group_name||''}</span><span>${m.stadium ? m.stadium+', '+m.city : ''} <span class="toggle-arrow">▼</span></span></div>
    <div class="sched-detail" id="sd-${m.id}"></div>
  </div>`;
}

function renderGames() {
  const gameLookup = buildGameLookup();
  schedIdLookup = buildSchedIdLookup();

  // Group schedule by date
  const byDate = {};
  scheduleData.forEach(m => {
    if (!byDate[m.match_date]) byDate[m.match_date] = [];
    byDate[m.match_date].push(m);
  });

  // Also add prediction games that aren't in schedule (knockout slots etc)
  const schedTeamKeys = new Set();
  scheduleData.forEach(m => {
    schedTeamKeys.add(`${normTeam(m.home_team)}|${normTeam(m.away_team)}`);
    schedTeamKeys.add(`${normTeam(m.away_team)}|${normTeam(m.home_team)}`);
  });
  const unmatchedGames = allGames.filter(g => {
    const key = `${normTeam(g.home)}|${normTeam(g.away)}`;
    return !schedTeamKeys.has(key);
  });
  unmatchedGames.forEach(g => {
    const d = g.kickoff ? g.kickoff.slice(0,10) : '9999-99-99';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({_predGame: g});
  });

  const dates = Object.keys(byDate).sort();
  const today = new Date().toISOString().slice(0,10);

  // Date nav
  document.getElementById('date-nav').innerHTML = dates.map(d => {
    const dt = new Date(d+'T00:00:00');
    const isToday = d === today;
    return `<button class="date-btn${isToday?' active':''}" onclick="scrollToDate('${d}')">
      <span class="dow">${DOW[dt.getDay()]}</span>
      <span class="day">${dt.getDate()}</span>
    </button>`;
  }).join('');

  // Render day sections — track rendered prediction game IDs to avoid duplicates
  const renderedGameIds = new Set();
  document.getElementById('games-list').innerHTML = dates.map(date => {
    const items = byDate[date];
    const cardsHtml = items.map(m => {
      // Check if this is an unmatched prediction game injected directly
      if (m._predGame) { renderedGameIds.add(m._predGame.id); return renderPredGame(m._predGame); }

      // Check if this schedule match has a corresponding prediction game
      const h = normTeam(m.home_team), a = normTeam(m.away_team);
      const game = gameLookup[`${h}|${a}`];
      if (game && !renderedGameIds.has(game.id)) { renderedGameIds.add(game.id); return renderPredGame(game); }
      if (game && renderedGameIds.has(game.id)) return ''; // already rendered

      // Plain schedule card
      return renderSchedCard(m);
    }).join('');

    return `<div class="day-section" id="day-${date}">
      <div class="day-title">${fmtDate(date)}${date===today?' &mdash; Today':''}</div>
      ${cardsHtml}
    </div>`;
  }).join('');

  // Auto-scroll to today
  if (byDate[today]) {
    setTimeout(() => {
      document.getElementById('day-'+today)?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }
}

// ── Team helpers ──────────────────────────────────────────────────────────────
function teamSideHtml(name, matchPlayers) {
  const canonical = normTeam(name);
  const t = teamData[canonical];
  if (!t) return `<div class="mu-side"><div class="mu-hdr"><span class="mu-name">${name}</span></div><div class="mu-meta">No data yet</div></div>`;
  const flag = FLAG_MAP[canonical]||FLAG_MAP[name]||'';

  const matches = scheduleData.filter(m => m.status==='FT' && (normTeam(m.home_team)===canonical || normTeam(m.away_team)===canonical));
  let gf=0, ga=0;
  const recent = [];
  matches.forEach(m => {
    const isHome = normTeam(m.home_team)===canonical;
    const hs=m.home_score, as=m.away_score;
    const mGf=isHome?hs:as, mGa=isHome?as:hs;
    gf+=mGf; ga+=mGa;
    const opp = isHome ? normTeam(m.away_team) : normTeam(m.home_team);
    const oppFlag = FLAG_MAP[opp]||'';
    let res; if (mGf>mGa) res='W'; else if (mGf<mGa) res='L'; else res='D';
    recent.push({opp,oppFlag,gf:mGf,ga:mGa,res,isHome});
  });

  const form = recent.slice(-5);
  const formHtml = Array(5).fill(null).map((_,i) => {
    const r = form[i]?.res || 'U';
    return `<div class="mu-dot ${r.toLowerCase()}">${r}</div>`;
  }).join('');

  const matchesHtml = recent.slice(-3).map(m =>
    `<div>${m.isHome?'vs':'@'} ${m.oppFlag} ${m.opp} <span class="mu-match-res">${m.gf}-${m.ga}</span></div>`
  ).join('');

  // Lineup: use match-specific player_matches data if provided, else generic last_starting_xi
  let lineupHtml = '';
  if (matchPlayers && matchPlayers.length) {
    const starters = matchPlayers.filter(p => p.started).sort((a,b) => (a.formation_place||99) - (b.formation_place||99));
    const subs = matchPlayers.filter(p => p.subbed_in);
    const pLine = p => {
      let b = '';
      const goals = typeof p.goals === 'string' ? JSON.parse(p.goals) : (p.goals || []);
      goals.forEach(g => { b += `<span class="mu-ev">⚽</span>`; });
      const assists = typeof p.assists === 'string' ? JSON.parse(p.assists) : (p.assists || []);
      assists.forEach(() => { b += `<span class="mu-ev" style="font-size:9px">🎯</span>`; });
      if (p.yellow_card) b += `<span class="mu-ev">🟨</span>`;
      if (p.red_card) b += `<span class="mu-ev">🟥</span>`;
      if (p.subbed_out) b += `<span class="mu-sub-out"> ↓${p.sub_minute||''}</span>`;
      if (p.subbed_in) b += `<span class="mu-sub-in"> ↑${p.sub_minute||''}</span>`;
      return `<div class="mu-player"><span class="mu-jersey">${p.player.shirt_number}</span>${shortName(p.player.name)}${b} <span class="mu-pos">${p.position||''}</span></div>`;
    };
    lineupHtml = `<div class="mu-lineup"><div class="mu-lineup-hdr">Starting</div>${starters.map(pLine).join('')}${subs.length ? `<div class="mu-subs-hdr">Subs</div>${subs.map(pLine).join('')}` : ''}</div>`;
  } else if (t.last_formation) {
    lineupHtml = `<div class="mu-lineup"><div class="mu-lineup-hdr">Last starting lineup <span class="mu-formation">${t.last_formation}</span></div>${(t.last_starting_xi||[]).map(p => `<div class="mu-player"><span class="mu-jersey">${p.number}</span>${p.short||p.name} <span class="mu-pos">${p.position}</span></div>`).join('')}</div>`;
  }

  return `<div class="mu-side">
    <div class="mu-hdr"><span class="mu-flag">${flag}</span><div><div class="mu-name">${canonical}</div><div class="mu-meta">Group ${t.group_letter} · ${t.confederation||''}</div></div></div>
    <div class="mu-form">${formHtml}</div>
    <div class="mu-stats">
      <div class="mu-stat"><div class="mu-stat-val">${matches.length}</div><div class="mu-stat-lbl">Played</div></div>
      <div class="mu-stat"><div class="mu-stat-val">${gf}</div><div class="mu-stat-lbl">GF</div></div>
      <div class="mu-stat"><div class="mu-stat-val" style="color:${ga>0?'#e07070':'var(--dim)'}">${ga}</div><div class="mu-stat-lbl">GA</div></div>
    </div>
    ${matchesHtml ? `<div class="mu-matches">${matchesHtml}</div>` : ''}
    ${lineupHtml}
    <a class="mu-more" href="team.html?team=${encodeURIComponent(canonical)}" onclick="event.stopPropagation()">View full squad &rarr;</a>
  </div>`;
}

function matchupHtml(homeName, awayName, matchRows) {
  const hCanon = normTeam(homeName), aCanon = normTeam(awayName);
  if (!teamData[hCanon] && !teamData[aCanon]) return '';
  const homePlayers = matchRows ? matchRows.filter(r => normTeam(r.player.team_name) === hCanon) : null;
  const awayPlayers = matchRows ? matchRows.filter(r => normTeam(r.player.team_name) === aCanon) : null;
  return `<div class="matchup-bar">${teamSideHtml(homeName, homePlayers)}${teamSideHtml(awayName, awayPlayers)}</div>`;
}

function toggleWinnerPick(gameId) {
  const inp = document.getElementById(`inp-${gameId}`);
  const row = document.getElementById(`winner-row-${gameId}`);
  if (!row) return;
  const val = inp.value.trim();
  row.style.display = isDraw(val) ? 'flex' : 'none';
}

function toggleGame(id) {
  const pp = document.getElementById(`pp-${id}`);
  const gc = document.getElementById(`gc-${id}`);
  pp?.classList.toggle('open');
  gc?.classList.toggle('open');
  // Auto-load match data for finished prediction games
  if (pp?.classList.contains('open')) {
    const g = allGames.find(g => g.id === id);
    if (g?.result) {
      const sid = schedIdLookup[`${normTeam(g.home)}|${normTeam(g.away)}`];
      if (sid) loadPredMatchData(id, sid);
    }
  }
}

async function savePred(gameId) {
  const inp = document.getElementById(`inp-${gameId}`);
  const msg = document.getElementById(`msg-${gameId}`);
  const pred = inp.value.trim();
  const user = getUser();
  if (!pred || !user) return;

  const game = allGames.find(g => g.id === gameId);
  const winnerEl = document.getElementById(`winner-${gameId}`);
  const winner = (isKnockout(game) && isDraw(pred) && winnerEl) ? winnerEl.value || null : null;

  inp.disabled = true;
  try {
    const payload = { prediction: pred, winner };
    const existing = allPredictions.find(p => p.game_id===gameId && p.participant===user);
    if (existing) {
      await sb(`predictions?game_id=eq.${gameId}&participant=eq.${encodeURIComponent(user)}`, { method:'PATCH', body: JSON.stringify(payload) });
      existing.prediction = pred;
      existing.winner = winner;
    } else {
      await sb('predictions', { method:'POST', body: JSON.stringify({game_id:gameId, participant:user, ...payload}) });
      allPredictions.push({game_id:gameId, participant:user, prediction:pred, winner});
    }
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
    renderLB(); renderGames();
    setTimeout(() => { document.getElementById(`pp-${gameId}`)?.classList.add('open'); document.getElementById(`gc-${gameId}`)?.classList.add('open'); }, 50);
  } catch(e) {
    msg.textContent = 'Error'; msg.style.color='var(--red)'; msg.classList.add('show');
  } finally { inp.disabled = false; }
}

// ── Match detail (click to expand) ───────────────────────────────────────────
const matchDetailCache = {};

function parseMinute(str) {
  if (!str) return 999;
  const m = str.match(/(\d+)/);
  return m ? parseInt(m[1]) : 999;
}

function shortName(fullName) {
  if (!fullName) return '?';
  const parts = fullName.trim().split(/\s+/);
  if (parts.length <= 2) return fullName;
  return parts[0][0] + '. ' + parts[parts.length - 1];
}

async function fetchMatchData(schedId) {
  if (matchDetailCache[schedId]) return matchDetailCache[schedId];
  const rows = await sb(`player_matches?select=*,player:players!player_matches_player_id_fkey(name,shirt_number,team_name)&game_id=eq.${schedId}&order=formation_place`);
  matchDetailCache[schedId] = rows;
  return rows;
}

// Schedule card toggle — shows matchup bar + timeline
async function toggleSchedDetail(schedId) {
  const panel = document.getElementById(`sd-${schedId}`);
  const card = document.getElementById(`sc-${schedId}`);
  if (!panel) return;
  if (panel.classList.contains('open')) { panel.classList.remove('open'); card?.classList.remove('open'); return; }
  panel.classList.add('open'); card?.classList.add('open');

  const sched = scheduleData.find(s => s.id === schedId);
  if (!sched) return;
  const isFt = sched.status === 'FT';

  if (isFt) {
    panel.innerHTML = '<div class="md-loading">Loading…</div>';
    try {
      const rows = await fetchMatchData(schedId);
      if (!rows.length) { panel.innerHTML = matchupHtml(sched.home_team, sched.away_team); return; }
      panel.innerHTML = matchupHtml(sched.home_team, sched.away_team, rows) + buildTimeline(sched, rows) + buildStatsHtml(sched);
    } catch(e) { panel.innerHTML = matchupHtml(sched.home_team, sched.away_team) + '<div class="md-loading">Error loading match data</div>'; }
  } else {
    panel.innerHTML = matchupHtml(sched.home_team, sched.away_team);
  }
}

// For prediction cards: auto-load match data when panel opens (for finished games)
async function loadPredMatchData(gameId, schedId) {
  const mdEl = document.getElementById(`md-${schedId}`);
  const muEl = document.getElementById(`mu-${gameId}`);
  if (!mdEl || mdEl.dataset.loaded) return;
  mdEl.dataset.loaded = '1';

  const sched = scheduleData.find(s => s.id === schedId);
  if (!sched) { mdEl.innerHTML = ''; return; }

  try {
    const rows = await fetchMatchData(schedId);
    if (!rows.length) { mdEl.innerHTML = '<div class="md-loading">No match data</div>'; return; }
    // Update matchup bar with event badges
    const g = allGames.find(g => g.id === gameId);
    if (muEl && g) muEl.innerHTML = matchupHtml(g.home, g.away, rows);
    // Show timeline + stats
    mdEl.innerHTML = buildTimeline(sched, rows) + buildStatsHtml(sched);
  } catch(e) { mdEl.innerHTML = '<div class="md-loading">Error loading data</div>'; }
}

function buildTimeline(sched, rows) {
  const homeTeam = normTeam(sched.home_team);
  const awayTeam = normTeam(sched.away_team);

  const events = [];
  rows.forEach(pm => {
    const team = normTeam(pm.player.team_name);
    const side = team === homeTeam ? 'home' : 'away';
    const name = shortName(pm.player.name);

    const goals = typeof pm.goals === 'string' ? JSON.parse(pm.goals) : (pm.goals || []);
    goals.forEach(g => {
      const isOg = g.type==='own goal';
      // OGs display on the benefiting team's side (opposite of the scorer)
      const goalSide = isOg ? (side==='home'?'away':'home') : side;
      events.push({ type:'goal', minute:g.minute, min:parseMinute(g.minute), side:goalSide, name, penalty:g.type==='penalty', og:isOg });
    });

    const assists = typeof pm.assists === 'string' ? JSON.parse(pm.assists) : (pm.assists || []);
    assists.forEach(a => {
      events.push({ type:'assist', minute:a.minute, min:parseMinute(a.minute), side, name, _assoc:true });
    });

    if (pm.yellow_card) events.push({ type:'card-y', minute:pm.yellow_card, min:parseMinute(pm.yellow_card), side, name });
    if (pm.red_card) events.push({ type:'card-r', minute:pm.red_card, min:parseMinute(pm.red_card), side, name });

    if (pm.subbed_in && pm.sub_minute) events.push({ type:'sub', minute:pm.sub_minute, min:parseMinute(pm.sub_minute), side, name, subDir:'in' });
    if (pm.subbed_out && pm.sub_minute) events.push({ type:'sub', minute:pm.sub_minute, min:parseMinute(pm.sub_minute), side, name, subDir:'out' });
  });

  // Pair assists with goals
  events.filter(e => e.type === 'goal').forEach(g => {
    const a = events.find(a => a.type === 'assist' && a.min === g.min && a.side === g.side && !a._used);
    if (a) { g.assistName = a.name; a._used = true; }
  });

  // Pair subs
  events.filter(e => e.type === 'sub' && e.subDir === 'in').forEach(si => {
    const so = events.find(so => so.type === 'sub' && so.subDir === 'out' && so.min === si.min && so.side === si.side && !so._used);
    if (so) { si.replacedName = so.name; so._used = true; }
  });

  const timeline = events.filter(e => !e._used && !e._assoc).sort((a,b) => a.min - b.min);
  if (!timeline.length) return '';

  const evHtml = timeline.map(e => {
    let content = '';
    if (e.type === 'goal') {
      content = `⚽ <span class="md-ev-name">${e.name}</span>${e.og?' <span class="md-ev-assist">(OG)</span>':''}${e.penalty?' <span class="md-ev-assist">(pen)</span>':''}${e.assistName?` <span class="md-ev-assist">(${e.assistName})</span>`:''}`;
    } else if (e.type === 'card-y') {
      content = `🟨 <span class="md-ev-name">${e.name}</span>`;
    } else if (e.type === 'card-r') {
      content = `🟥 <span class="md-ev-name">${e.name}</span>`;
    } else if (e.type === 'sub') {
      content = `<span class="md-ev-sub-in">↑ ${e.name}</span>${e.replacedName ? ` <span class="md-ev-sub-out">↓ ${e.replacedName}</span>` : ''}`;
    }

    const homeCell = e.side === 'home' ? content : '';
    const awayCell = e.side === 'away' ? content : '';

    return `<div class="md-ev">
      <div class="md-ev-home">${homeCell}</div>
      <div class="md-ev-min"><span>${e.minute}</span></div>
      <div class="md-ev-away">${awayCell}</div>
    </div>`;
  }).join('');

  return `<div class="md-timeline" style="margin:12px 0;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">${evHtml}</div>`;
}

function buildStatsHtml(sched) {
  const ms = sched.match_stats;
  if (!ms || !ms.home || !ms.away) return '';
  const hs = ms.home.stats, as = ms.away.stats;

  const DISPLAY = [
    ['possessionPct', 'Possession', '%'],
    ['totalShots', 'Shots', ''],
    ['shotsOnTarget', 'On Target', ''],
    ['wonCorners', 'Corners', ''],
    ['foulsCommitted', 'Fouls', ''],
    ['offsides', 'Offsides', ''],
    ['accuratePasses', 'Passes', ''],
    ['saves', 'Saves', ''],
  ];

  const rows = DISPLAY.map(([key, label, suffix]) => {
    const hv = parseFloat(hs[key]) || 0;
    const av = parseFloat(as[key]) || 0;
    const total = hv + av || 1;
    const hPct = (hv / total * 100).toFixed(0);
    const aPct = (av / total * 100).toFixed(0);
    const hWin = hv >= av ? 'winner' : 'loser';
    const aWin = av >= hv ? 'winner' : 'loser';
    const hDisp = key === 'possessionPct' ? hs[key] + '%' : hs[key];
    const aDisp = key === 'possessionPct' ? as[key] + '%' : as[key];

    return `<div class="md-stat-row">
      <div class="md-stat-val home">${hDisp ?? hv}</div>
      <div class="md-stat-bar home"><div class="md-stat-fill ${hWin}" style="width:${hPct}%"></div></div>
      <div class="md-stat-lbl">${label}</div>
      <div class="md-stat-bar away"><div class="md-stat-fill ${aWin}" style="width:${aPct}%"></div></div>
      <div class="md-stat-val away">${aDisp ?? av}</div>
    </div>`;
  }).join('');

  const fmtHome = ms.home.formation ? `<span>${ms.home.formation}</span>` : '';
  const fmtAway = ms.away.formation ? `<span>${ms.away.formation}</span>` : '';

  return `<div class="md-stats" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
    ${fmtHome || fmtAway ? `<div class="md-formations"><div>${flagFor(sched.home_team)} ${fmtHome}</div><div>Formation</div><div>${fmtAway} ${flagFor(sched.away_team)}</div></div>` : ''}
    ${rows}
  </div>`;
}

load();
</script>
</body>
</html>
