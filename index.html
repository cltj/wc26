<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 – Prediction League</title>
<link rel="stylesheet" href="shared_styles.css">
<style>
.lb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; }
.lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0 0 14px; overflow: hidden; position: relative; transition: transform .15s; }
.lb-card:hover { transform: translateY(-2px); }
.lb-card.rank-1 { border-color: var(--gold); }
.lb-card.rank-2 { border-color: var(--silver); }
.lb-card.rank-3 { border-color: var(--bronze); }
.lb-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; background: #071810; }
.lb-ribbon { position: absolute; top: 8px; left: 8px; font-family: 'Bebas Neue',sans-serif; font-size: 11px; letter-spacing: .1em; padding: 3px 8px; border-radius: 4px; }
.rank-1 .lb-ribbon { background: var(--gold); color: #003; }
.rank-2 .lb-ribbon { background: var(--silver); color: #111; }
.rank-3 .lb-ribbon { background: var(--bronze); color: #fff; }
.rank-4 .lb-ribbon, .rank-5 .lb-ribbon { background: rgba(255,255,255,.1); color: var(--dim); }
.lb-body { padding: 10px 12px 0; }
.lb-name { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
.lb-pts  { font-family: 'Bebas Neue',sans-serif; font-size: 40px; line-height: 1; margin-bottom: 8px; }
.rank-1 .lb-pts { color: var(--gold); }
.lb-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.lb-card.rank-1::after { content: '🏆'; position: absolute; top: 8px; right: 8px; font-size: 16px; opacity: .8; }

.games-list { display: flex; flex-direction: column; gap: 10px; }
.game-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.game-card.norway { border-left: 3px solid var(--norway); }
.game-hdr { display: grid; grid-template-columns: 28px 1fr auto 1fr auto; align-items: center; gap: 8px; padding: 12px 14px; cursor: pointer; user-select: none; }
.game-hdr:hover { background: rgba(255,255,255,.025); }
.g-num  { font-family: 'Bebas Neue',sans-serif; font-size: 16px; color: var(--dim); text-align: center; }
.g-team { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.g-team.home { text-align: right; }
.g-score { font-family: 'JetBrains Mono',monospace; font-size: 16px; min-width: 50px; text-align: center; padding: 3px 8px; border-radius: 5px; background: rgba(255,255,255,.05); }
.g-score.done { background: rgba(240,180,41,.12); color: var(--gold); }
.g-score.pending { color: var(--dim); font-size: 11px; }
.g-meta { font-size: 10px; color: var(--dim); text-align: right; line-height: 1.5; }
.lock-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: rgba(224,52,52,.15); color: #e07070; }
.open-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: rgba(96,185,122,.15); color: var(--green); }
.norway-badge { font-size: 9px; font-weight: 700; background: rgba(239,43,45,.15); color: #f47c7e; padding: 2px 5px; border-radius: 3px; margin-left: 3px; vertical-align: middle; }
.preds-panel { display: none; border-top: 1px solid var(--border); padding: 12px 14px; }
.preds-panel.open { display: block; }
.preds-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.pred-cell { flex: 1; min-width: 88px; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; }
.pred-name { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
.pred-score { font-family: 'JetBrains Mono',monospace; font-size: 14px; font-weight: 500; }
.pred-score.empty { color: var(--dim); font-size: 11px; font-family: 'Inter',sans-serif; }
.pred-inp-row { display: flex; gap: 8px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
.pred-inp-row label { font-size: 12px; color: var(--dim); white-space: nowrap; }
.pred-inp { width: 90px; font-family: 'JetBrains Mono',monospace; }
.save-msg { font-size: 11px; margin-left: 4px; opacity: 0; transition: opacity .3s; }
.save-msg.show { opacity: 1; }
.locked-msg { font-size: 11px; color: #e07070; font-style: italic; }
.toggle-arrow { font-size: 9px; color: var(--dim); transition: transform .2s; margin-left: 3px; }
.game-card.open .toggle-arrow { transform: rotate(180deg); }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="tourn-label">FIFA World Cup 2026</div>
    <h1>Prediction <span>League</span></h1>
    <div class="subtitle">Eivind · Mari · Benny · Martin · TJ · Helle</div>
  </div>

  <section style="margin-bottom:40px">
    <div class="section-title">Standings</div>
    <div class="lb-grid" id="lb-grid"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
  </section>

  <section>
    <div class="section-title">Games</div>
    <div class="games-list" id="games-list"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
  </section>
</div>

<script src="shared_constants.js"></script>
<script src="shared_nav.js"></script>
<script>
injectNav('index');
const rankLabel = ['🥇 1st','🥈 2nd','🥉 3rd','4th','5th','6th'];
const rankClass = ['rank-1','rank-2','rank-3','rank-4','rank-5','rank-6'];
let allGames = [], allPredictions = [];

async function load() {
  [allGames, allPredictions] = await Promise.all([
    sb('games?select=*&order=id'),
    sb('predictions?select=*')
  ]);
  renderLB(); renderGames();
}

function renderLB() {
  const lb = buildLeaderboard(allGames, allPredictions);
  document.getElementById('lb-grid').innerHTML = lb.map(([name, s], i) => `
    <div class="lb-card ${rankClass[i]||''}">
      <div style="position:relative">
        <img class="lb-photo" src="${PLAYER_PHOTOS[name]}" alt="${name}" loading="lazy"
          onerror="this.src='${BASE_URL}/placeholder.jpg'">
        <span class="lb-ribbon">${rankLabel[i]||''}</span>
      </div>
      <div class="lb-body">
        <div class="lb-name">${name}</div>
        <div class="lb-pts">${s.pts}</div>
        <div class="lb-chips">
          ${s.exact  ? `<span class="chip chip-exact">${s.exact}× exact</span>`  : ''}
          ${s.winner ? `<span class="chip chip-win">${s.winner}× winner</span>`  : ''}
          ${s.wrong  ? `<span class="chip chip-wrong">${s.wrong}× miss</span>`   : ''}
          ${s.missed ? `<span class="chip chip-missed">${s.missed}× skipped</span>` : ''}
          <span class="chip chip-played">${s.played} played</span>
        </div>
      </div>
    </div>`).join('');
}

function badgeHtml(result, pred) {
  const st = predStatus(result, pred);
  if (st==='pending') return '';
  if (st==='missed')  return `<span class="badge badge-m">— missed</span>`;
  if (st==='exact')   return `<span class="badge badge-3">⚽ 3 pts</span>`;
  if (st==='winner')  return `<span class="badge badge-1">✓ 1 pt</span>`;
  return `<span class="badge badge-0">✗ 0 pts</span>`;
}

function renderGames() {
  const user = getUser();
  document.getElementById('games-list').innerHTML = allGames.map(g => {
    const locked = new Date() >= new Date(g.kickoff);
    const norway = [g.home,g.away].some(t => t.toLowerCase()==='norway' || t.toLowerCase()==='iraq');
    const kickoff = new Date(g.kickoff);
    const dateStr = kickoff.toLocaleDateString('no-NO',{day:'numeric',month:'short'});
    const timeStr = kickoff.toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'});
    const homeL = g.home + (g.home.toLowerCase()==='norway'?' <span class="norway-badge">🇳🇴</span>':'');
    const awayL = g.away + (g.away.toLowerCase()==='norway'?' <span class="norway-badge">🇳🇴</span>':'');

    const predsHtml = CONTENDERS.map(name => {
      const p = allPredictions.find(p => p.game_id===g.id && p.participant===name);
      return `<div class="pred-cell">
        <div class="pred-name">${name}</div>
        <div class="pred-score ${p?.prediction?'':'empty'}">${p?.prediction||'—'}</div>
        ${g.result ? badgeHtml(g.result, p?.prediction) : (p&&isValidScore(p.prediction)?'<span class="badge badge-t">Tipped ✓</span>':'')}
      </div>`;
    }).join('');

    let inputHtml = '';
    if (user) {
      const myP = allPredictions.find(p => p.game_id===g.id && p.participant===user);
      inputHtml = locked
        ? `<div class="pred-inp-row"><span class="locked-msg">🔒 Locked — game has started</span></div>`
        : `<div class="pred-inp-row">
            <label>Your tip:</label>
            <input class="inp pred-inp" id="inp-${g.id}" placeholder="e.g. 2-1" maxlength="6" value="${myP?.prediction||''}">
            <button class="btn btn-gold" style="padding:7px 14px;font-size:12px" onclick="savePred(${g.id})">Save</button>
            <span class="save-msg" id="msg-${g.id}" style="color:var(--green)">Saved ✓</span>
          </div>`;
    }

    return `<div class="game-card${norway?' norway':''}" id="gc-${g.id}">
      <div class="game-hdr" onclick="toggleGame(${g.id})">
        <div class="g-num">${g.id}</div>
        <div class="g-team home">${homeL}</div>
        <div class="g-score ${g.result?'done':'pending'}">${g.result||'vs'}</div>
        <div class="g-team">${awayL}</div>
        <div class="g-meta">${dateStr} ${timeStr}<br>${locked?'<span class="lock-pill">LOCKED</span>':'<span class="open-pill">OPEN</span>'} <span class="toggle-arrow">▼</span></div>
      </div>
      <div class="preds-panel" id="pp-${g.id}">
        <div class="preds-grid">${predsHtml}</div>
        ${inputHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleGame(id) {
  document.getElementById(`pp-${id}`)?.classList.toggle('open');
  document.getElementById(`gc-${id}`)?.classList.toggle('open');
}

async function savePred(gameId) {
  const inp = document.getElementById(`inp-${gameId}`);
  const msg = document.getElementById(`msg-${gameId}`);
  const pred = inp.value.trim();
  const user = getUser();
  if (!pred || !user) return;
  inp.disabled = true;
  try {
    const existing = allPredictions.find(p => p.game_id===gameId && p.participant===user);
    if (existing) {
      await sb(`predictions?game_id=eq.${gameId}&participant=eq.${encodeURIComponent(user)}`, { method:'PATCH', body: JSON.stringify({prediction:pred}) });
      existing.prediction = pred;
    } else {
      await sb('predictions', { method:'POST', body: JSON.stringify({game_id:gameId, participant:user, prediction:pred}) });
      allPredictions.push({game_id:gameId, participant:user, prediction:pred});
    }
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
    renderLB(); renderGames();
    setTimeout(() => { document.getElementById(`pp-${gameId}`)?.classList.add('open'); document.getElementById(`gc-${gameId}`)?.classList.add('open'); }, 50);
  } catch(e) {
    msg.textContent = 'Error'; msg.style.color='var(--red)'; msg.classList.add('show');
  } finally { inp.disabled = false; }
}

load();
</script>
</body>
</html>
